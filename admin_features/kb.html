<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>知識庫 (CMS)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style id="security-curtain">
        body { visibility: hidden !important; opacity: 0 !important; }
    </style>
    <style>
        /* --- 1. 基礎與變數 --- */
        :root { --forest: #1a2f23; --cream: #fdfaf1; --accent: #c6a87c; --dark: #2c3e50; --danger: #e74c3c; --info: #3498db; --success: #27ae60; --warning: #f39c12; --purple: #9b59b6; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: transparent; margin: 0; padding: 10px; color: #333; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid var(--accent); }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; transition:0.2s; display: inline-block; margin-right: 5px; text-decoration: none; white-space:nowrap; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-forest { background: var(--forest); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border: 1px solid #ccc; color: #666; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; margin-bottom: 5px; }

        /* --- 2. 知識庫與圖庫專屬樣式 --- */
        .kb-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: calc(100vh - 20px); transition: all 0.3s ease; }
        .kb-layout.collapsed { grid-template-columns: 0 1fr; gap: 0; }
        .kb-sidebar { background: #2c3e50; color: #ecf0f1; border-radius: 8px; overflow-y: auto; display: flex; flex-direction: column; overflow-x: hidden; white-space: nowrap; }
        .kb-header { padding: 15px; background: #1a252f; border-bottom: 1px solid #34495e; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .kb-tree-content { padding: 10px; flex: 1; }
        
        details.big-cat { margin-bottom: 5px; }
        details.big-cat > summary { padding: 10px; cursor: pointer; font-weight: bold; list-style: none; border-radius: 4px; color: #ecf0f1; }
        details.big-cat > summary:hover { background: rgba(255,255,255,0.1); }
        details.mid-cat { margin-left: 12px; border-left: 1px solid #555; }
        details.mid-cat > summary { padding: 8px; cursor: pointer; color: #ccc; font-size: 0.95rem; }
        details.mid-cat > summary:hover { color: #fff; }
        .article-item { padding: 8px 10px 8px 20px; cursor: pointer; color: #bdc3c7; display: flex; align-items: center; font-size: 0.95rem; border-radius: 4px; transition: 0.2s; border-bottom: 1px solid #34495e; }
        .article-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .article-item.active { color: #fff; background: #c6a87c; font-weight: bold; }
        .article-item.draft { color: #e74c3c; } 
        .article-item.draft::before { content: '🔴 '; font-size: 10px; }
        .article-title-span { flex: 1; }

        .sort-actions { display: inline-flex; gap: 2px; margin-right: 8px; vertical-align: middle; }
        .btn-sort-arrow { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa; cursor: pointer; padding: 0 4px; font-size: 10px; border-radius: 3px; line-height: 1.2; }
        .btn-sort-arrow:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .article-item .sort-actions { margin-right: 10px; opacity: 0.3; transition: 0.2s; }
        .article-item:hover .sort-actions { opacity: 1; }

        /* --- 3. 編輯器專屬 --- */
        .editor-wrapper { flex: 1; background: white; border: 1px solid #ccc; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 500px; }
        .toolbar { padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .tb-group { display: flex; gap: 2px; padding-right: 8px; margin-right: 8px; border-right: 1px solid #ddd; align-items: center; }
        .tb-group:last-child { border-right: none; }
        .editor-btn { padding: 6px 10px; border: 1px solid transparent; background: transparent; cursor: pointer; border-radius: 4px; color: #444; font-size: 14px; transition: 0.2s; display:flex; align-items:center; justify-content:center; white-space: nowrap; }
        .editor-btn:hover { background: #e2e6ea; }
        /* 啟動狀態的按鈕發光 */
        .editor-btn.active { background: var(--forest) !important; color: white !important; border-color: var(--forest) !important; }
        .editor-btn.active i { color: white !important; }
        .btn-magic { font-weight: bold; font-size: 12px; background: white; border: 1px solid #ccc; color: var(--forest); }
        .btn-magic:hover { border-color: var(--accent); background: #fffcf5; }
        #editor { flex: 1; padding: 40px 50px; overflow-y: auto; outline: none; color: #2c3e50; font-size: 16px; }
        #editor:empty:before { content: '請在此輸入內容... (💡 提示：雙擊圖片或表格可開啟設定選單)'; color: #ccc; }
        .source-view { flex: 1; width: 100%; box-sizing: border-box; background: #2d2d2d; color: #e6e6e6; padding: 20px; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6; border: none; resize: none; display: none; outline: none; overflow-y: auto; }
        select.tb-select { padding: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; background: white; cursor: pointer; height: 30px; }
        .color-picker-wrapper { position: relative; width: 30px; height: 30px; overflow: hidden; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; display:inline-block; }
        .color-picker-wrapper input { position: absolute; top: -5px; left: -5px; width: 40px; height: 40px; cursor: pointer; }

        /* 浮動選單、修改徽章與物件 */
        .obj-selected { outline: 3px solid #e74c3c !important; outline-offset: -2px; }
        #edit-badge { display: none; position: fixed; z-index: 1999; gap: 5px; }
        .badge-icon { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.3); border: 1px solid #fff; transition: 0.2s; }
        .badge-icon:hover { transform: scale(1.1); }
        .badge-red { background: #e74c3c; } .badge-red:hover { background: #c0392b; }
        .badge-blue { background: #3498db; } .badge-blue:hover { background: #2980b9; }
        #float-menu { position: fixed !important; display: none; background: #fff; border: 1px solid #c6a87c; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; z-index: 2000 !important; gap: 8px; align-items: center; flex-wrap: wrap; max-width: 400px; }

        /* 🛠️ 頁籤群組：左右絕對不設防模式 */
        .peiyu-tabs-wrapper { 
            width: 100% !important; 
            border-top: 4px dashed #c6a87c !important; 
            border-bottom: 4px dashed #c6a87c !important;
            background: #fffdf9; margin: 50px 0; padding: 45px 0 20px 0;
            position: relative; clear: both;
        }

        /* 🔒 鋼鐵標籤復活！純視覺顯示，絕對刪不掉 */
        .peiyu-tabs-wrapper::before {
            content: "📑 內文頁籤群組 (點擊黃底虛線外框開啟選單)";
            position: absolute; top: 0; left: 0; right: 0;
            background: #c6a87c; color: #fff; padding: 6px 20px;
            font-weight: bold; font-size: 13px; z-index: 5;
            pointer-events: none; 
        }

        .peiyu-tab-section { width: 100% !important; padding: 0; margin: 30px 0; border-bottom: 1px dashed #eee; padding-bottom: 20px; }

        /* 📍 區段標籤防護 */
        .peiyu-tab-label-row {
            background: #f0f4f8; padding: 6px 12px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 5px; border-left: 5px solid #2980b9;
        }
        .peiyu-tab-label-row::before {
            content: "📍 頁籤名稱："; font-size: 13px; font-weight: bold; color: #2980b9;
        }

        .peiyu-tab-body {
            width: 100% !important; background: #fff; padding: 15px 0 !important; min-height: 50px; clear: both;
        }

        /* 嚴格的全局防爆規則 (修正：允許手動縮小寬度，但上限鎖死 100%) */
        .peiyu-table, table { border-collapse: collapse; width: 100%; max-width: 100% !important; box-sizing: border-box !important; table-layout: fixed !important; }
        .peiyu-table th, .peiyu-table td { padding: 8px 12px; min-width: 50px; border: 1px solid #ddd; vertical-align: middle; max-width: 100% !important; box-sizing: border-box !important; word-wrap: break-word !important; overflow-wrap: break-word !important; }
        .peiyu-table td div { margin: 4px 0 !important; }
        .peiyu-table td p { margin-bottom: 4px !important; }
        .resizable-wrapper { position: relative; display: block; margin: 10px 0; max-width: 100% !important; clear: both; box-sizing: border-box !important; }
        .resizable-wrapper img, img { display: block; max-width: 100% !important; border-radius: 8px; width: 100%; height: auto !important; box-sizing: border-box !important; }

        /* 彈窗與圖庫 */
        .editor-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .editor-modal-box { background: white; padding: 25px; border-radius: 12px; width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .editor-gallery-box { width: 90%; max-width: 850px; height: 80vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
        .editor-gallery-header { padding: 15px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .editor-gallery-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); grid-auto-rows: 120px; gap: 15px; padding: 20px; background: #fdfdfd; align-content: start; }
        .editor-gallery-item { position: relative; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; background: #fff; display: flex; align-items: center; justify-content: center; }
        .editor-gallery-item:hover { border-color: #3498db; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 10; }
        .editor-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gallery-item-name { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.65); color: #fff; font-size: 11px; padding: 5px 8px; box-sizing: border-box; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .editor-form-group { margin-bottom: 15px; }
        .editor-form-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .editor-form-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .editor-sp-slider { width: 100%; cursor: pointer; margin-top: 5px; }
        .editor-sp-val { color: var(--forest); font-family: monospace; font-size: 14px; }
        /* --- 5. 右鍵選單專屬樣式 --- */
        #custom-context-menu { position: fixed; display: none; background: white; border: 1px solid #ccc; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border-radius: 8px; z-index: 9999; padding: 5px 0; min-width: 200px; font-size: 14px; color: #333; overflow: hidden; }
        .context-menu-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .context-menu-item:hover { background: #f4f7f6; color: var(--forest); font-weight: bold; }
        .context-shortcut { color: #aaa; font-size: 11px; font-family: monospace; font-weight: normal; }

        /* --- 4. 你的手機版終極優化 RWD (原封不動保留) --- */
        @media (max-width: 1024px) {
            body { 
                overflow-y: auto !important; 
                height: auto !important; 
                background: #f4f7f6 !important; 
            }
            
            .kb-layout { 
                display: flex !important; 
                flex-direction: column; 
                height: auto !important; 
                overflow-y: visible !important; 
            }
            
            .kb-sidebar { 
                height: 350px; 
                min-height: 350px; 
                margin-bottom: 20px; 
                width: 100%; 
                flex-shrink: 0;
            }

            .kb-layout > .card { 
                height: auto !important; 
                overflow-x: hidden !important; /* 🔥 嚴格鎖死 X 軸，不准破窗 */
                padding: 15px !important; 
                margin-bottom: 80px !important; 
            }

            .editor-wrapper { 
                height: auto !important; 
                overflow-x: hidden !important; /* 🔥 嚴格鎖死 X 軸 */
                min-height: 600px;
                max-width: 100% !important;
            }

            #editor { 
                height: auto !important; 
                min-height: 500px; 
                padding: 15px !important; 
                overflow-x: hidden !important; /* 🔥 嚴格鎖死 X 軸，圖片再大也會被切斷在框內 */
            }

            /* 分類與標題優化 */
            .kb-layout > .card > div:has(#kb-big), 
            .kb-layout > .card > div:has(#kb-title) { 
                flex-direction: column !important; 
                align-items: flex-start !important; 
                gap: 10px !important; 
                margin-bottom: 15px !important; 
            }

            #kb-big, #kb-mid { width: 100% !important; max-width: none !important; }
            #kb-title { width: 100% !important; }

            /* 修正後的抽屜面板位置 */
            .editor-sticky-header { 
                position: fixed !important; 
                top: 50% !important;             /* 🌟 定位在 50% 高度 */
                right: 15px !important; 
                z-index: 6000; 
                background: rgba(255, 255, 255, 0.95) !important; 
                backdrop-filter: blur(10px); 
                width: 130px !important; 
                max-height: 70vh !important;     /* 稍微加長面板高度，讓按鈕好按 */
                box-shadow: 0 5px 25px rgba(0,0,0,0.2) !important; 
                border-radius: 12px !important; 
                border: 1px solid #eee; 
                
                /* 🌟 核心修正：垂直置中並預設藏在右側 */
                transform: translateY(-50%) translateX(150%) !important; 
                
                opacity: 0; 
                transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
                display: flex !important; 
                flex-direction: column !important; 
                overflow-y: auto !important; 
                padding: 12px 10px !important; 
            }

            /* 🌟 核心修正：打開時保持垂直置中 */
            .editor-sticky-header.show-drawer { 
                transform: translateY(-50%) translateX(0) !important; 
                opacity: 1 !important; 
            }
            .editor-sticky-header::-webkit-scrollbar { display: none; }
            .editor-sticky-header .toolbar { display: flex !important; flex-direction: column !important; width: 100% !important; padding: 0 !important; border: none !important; background: transparent !important; gap: 12px !important; }
            .tb-group { display: flex !important; flex-direction: row !important; flex-wrap: wrap !important; justify-content: center !important; width: 100% !important; padding: 0 0 12px 0 !important; margin: 0 !important; border-right: none !important; border-bottom: 1px dashed #ddd !important; gap: 6px !important; }
            .tb-group:last-child { border-bottom: none !important; padding-bottom: 0 !important; }
            .tb-group b { display: none !important; }
            .editor-btn { width: 32px !important; height: 32px !important; padding: 0 !important; display: flex !important; justify-content: center !important; align-items: center !important; border-radius: 6px !important; flex-shrink: 0; }
            .btn-magic, .editor-btn[onclick="toggleSource()"], .editor-btn[onclick="openModal('spacing')"] { width: 100% !important; height: 36px !important; padding: 0 10px !important; margin: 0 !important; white-space: nowrap !important; font-size: 13px !important; justify-content: center !important; border-radius: 8px !important; }
            select.tb-select { width: 100% !important; height: 34px !important; font-size: 12px !important; padding: 0 5px !important; margin: 0 !important; }
            .color-picker-wrapper { margin: 0 !important; }
            
            /* 圖庫手機版 */
            .editor-gallery-box { width: 95% !important; height: 90vh !important; }
            .editor-gallery-header { flex-direction: column !important; align-items: stretch !important; gap: 15px !important; padding: 20px 15px !important; }
            .editor-gallery-header > div:first-child { display: flex !important; justify-content: space-between !important; width: 100% !important; margin-bottom: 5px; }
            .editor-gallery-header > div:last-child { display: flex !important; flex-direction: column !important; width: 100% !important; gap: 10px !important; }
            #custom-img-name { width: 100% !important; box-sizing: border-box; height: 40px; }
            .editor-gallery-header > div:last-child .editor-btn { width: 100% !important; height: 40px; font-size: 15px !important; display: flex; justify-content: center; }
            .editor-gallery-grid { grid-template-columns: repeat(2, 1fr) !important; grid-auto-rows: 150px !important; gap: 10px !important; padding: 10px !important; }

            /* 🔥 手機版：修復 Modal 按鈕被擠壓的問題 */
            .editor-modal-box { width: 90% !important; padding: 20px !important; }
            #general-modal-box > div:last-child { 
                flex-direction: column-reverse !important; /* 改成上下排列，取消在下，確認在上 */
                gap: 10px !important; 
            }
            #general-modal-box > div:last-child .editor-btn { 
                width: 100% !important; 
                height: 45px !important; 
                font-size: 16px !important; 
                margin: 0 !important; 
            }
        }
    </style>
</head>
<body>

<div class="editor-modal-overlay" id="config-modal">
    <div class="editor-modal-box" id="general-modal-box">
        <div style="font-weight:bold; font-size:1.2rem; margin-bottom:15px; color:var(--forest);" id="m-title-editor">設定</div>
        <div id="m-body-editor"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="editor-btn" onclick="document.getElementById('config-modal').style.display='none'">取消</button>
            
            <button class="editor-btn" style="background:var(--forest); color:white; font-weight:bold; display:none;" id="m-update-btn" onclick="updateTableStyle()">✅ 確認修改</button>
            
            <button class="editor-btn" style="background:var(--forest); color:white; font-weight:bold;" id="m-confirm-btn" onclick="confirmInsert()">✅ 確認插入</button>
        </div>
    </div>
</div>

<div class="editor-modal-overlay" id="gallery-modal">
    <div class="editor-modal-box editor-gallery-box">
        <div class="editor-gallery-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <h3 style="margin:0;">圖庫</h3>
                <select id="bucket-select" onchange="switchBucket()" style="padding:5px; border-radius:4px;">
                    <option value="kb-images">文章配圖 (kb-images)</option>
                    <option value="site-assets">網站素材 (site-assets)</option>
                    <option value="banners">橫幅 (banners)</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="custom-img-name" placeholder="自訂檔名 (選填，例如：gate01)" style="width:200px; padding:5px; border:1px solid #ddd; border-radius:4px;">
                <input type="file" id="upload-input" accept="image/*" style="display:none" onchange="uploadToDB(this)">
                <button class="editor-btn" style="background:var(--forest); color:white;" onclick="document.getElementById('upload-input').click()">
                    <i class="fas fa-plus-circle"></i> 插入新圖片
                </button>
                <button class="editor-btn" style="background:#fee2e2; color:#e74c3c; border-color:#fca5a5;" onclick="document.getElementById('gallery-modal').style.display='none'">關閉</button>
            </div>
        </div>
        <div id="gallery-content" class="editor-gallery-grid">載入中...</div>
    </div>
</div>

<div class="kb-layout">
    <div class="kb-sidebar">
        <div class="kb-header">
            <span style="font-weight:bold;">知識庫列表</span>
            <button class="btn btn-success" style="padding:4px 8px; font-size:12px;" onclick="resetKbForm()">＋ 新增</button>
        </div>
        <div id="kb-tree" class="kb-tree-content"></div>
    </div>
    
    <div class="card" style="display:flex; flex-direction:column; overflow-y:hidden; height:100%; margin:0;">
        <span id="mode-title" style="display:none;">新增文章</span>
        <div style="display:flex; gap:15px; margin-bottom:8px; margin-top:5px; align-items:center;">
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="font-weight:bold; white-space:nowrap; font-size:14px; color:#555;">大分類</label>
                <input list="kb-big-list" id="kb-big" placeholder="例: 人類圖" style="width:140px; margin:0; padding:6px 10px;">
                <datalist id="kb-big-list"></datalist>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="font-weight:bold; white-space:nowrap; font-size:14px; color:#555;">中分類</label>
                <input list="kb-mid-list" id="kb-mid" placeholder="例: 通道" style="width:140px; margin:0; padding:6px 10px;">
                <datalist id="kb-mid-list"></datalist>
            </div>
        </div>
        
        <div style="display:flex; gap:15px; margin-bottom:12px; align-items:center;">
            <div style="display:flex; align-items:center; gap:8px; flex:1;">
                <label style="font-weight:bold; white-space:nowrap; font-size:14px; color:#555;">文章標題</label>
                <input type="text" id="kb-title" placeholder="輸入標題..." style="margin:0; padding:6px 10px;">
            </div>
            
            <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
                <label style="display:flex; align-items:center; gap:5px; font-weight:bold; margin:0; cursor:pointer; font-size:14px; white-space:nowrap;">
                    <input type="checkbox" id="kb-pub" checked style="width:18px; height:18px; cursor:pointer;"> 前台顯示
                </label>

<script>
    
    // 🌟 知識庫專屬變數
    let cache = { articles: [] };
    let kbCatOrder = { big: [], mid: {} };
    let currentBucket = 'kb-images';

    // 🌟 手機版反藍護盾：防止點擊工具列時鍵盤收起與反藍消失
    document.addEventListener("DOMContentLoaded", () => {
        // 🔥 修正：把 .tb-select 拿掉，只攔截按鈕，放行下拉選單跟調色盤！
        const toolbarBtns = document.querySelectorAll('.editor-sticky-header .editor-btn');
        toolbarBtns.forEach(btn => {
            btn.addEventListener('mousedown', function(e) {
                // 攔截焦點轉移，保護編輯器裡的反白狀態
                e.preventDefault(); 
            });
        });
    });
    // ==========================================
    // 1. 啟動與讀取資料 (取代原本的 fetchAll)
    // ==========================================
    async function fetchKbData() {
        try {
            // 讀取文章列表
            let ar = await myDB.from('kb_articles').select('*').order('sort_order');
            if (ar.error) ar = await myDB.from('kb_articles').select('*').order('created_at', {ascending:false});
            
            // 讀取排序設定
            const cfg = await myDB.from('site_content').select('content').eq('title', 'kb_category_order').single();
            
            cache.articles = ar.data || [];
            if (cfg.data && cfg.data.content) { kbCatOrder = cfg.data.content; } else { kbCatOrder = { big: [], mid: {} }; }
            
            syncKbOrderKeys();
            renderKbTree(); 
        } catch(e) { console.error("讀取知識庫失敗:", e); }
    }

    // ==========================================
    // 2. 你的原版 JavaScript 靈魂 (100% 複製不更動)
    // ==========================================
    function toggleKbSidebar() { document.querySelector('.kb-layout').classList.toggle('collapsed'); }
    // 🌟 升級版讀取文章：自動回到最上方，並精準還原專屬排版設定
    async function editKb(id) {
        try { 
            const {data, error} = await myDB.from('kb_articles').select('*').eq('id',id).single(); 
            if(error || !data) return alert("讀取失敗"); 
            
            document.getElementById('kb-id').value = data.id; 
            document.getElementById('kb-title').value = data.title;
            document.getElementById('kb-big').value = data.big_category; 
            document.getElementById('kb-mid').value = data.mid_category;
            document.getElementById('btn-kb-del').style.display = 'inline-block';
            document.getElementById('kb-pub').checked = data.is_published !== false;

            // 準備解析存檔的 HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.body || '', 'text/html');

            // 🔥 1. 抓取這篇文章專屬的排版設定，並還原到滑桿系統中
            const styleTag = doc.querySelector('.peiyu-dynamic-config');
            if (styleTag && styleTag.getAttribute('data-cfg')) {
                try {
                    spacingCfg = JSON.parse(styleTag.getAttribute('data-cfg'));
                } catch(e) {
                    spacingCfg = { lh: 1.6, pmb: 0.5, lmtb: 0.5, limb: 0.3 }; // 解析失敗則用預設
                }
            } else {
                spacingCfg = { lh: 1.6, pmb: 0.5, lmtb: 0.5, limb: 0.3 }; // 舊文章沒有設定則用預設
            }
            applySpacingToEditor(); // 立即套用排版到編輯器預覽畫面

            // 🔥 2. 載入文章內容
            const wrapper = doc.querySelector('.peiyu-article');
            document.getElementById('editor').innerHTML = wrapper ? wrapper.innerHTML : (data.body || '');
            history = [document.getElementById('editor').innerHTML]; historyIndex = 0; 
            
            // 🔥 3. 強制讓編輯器的捲軸回到最上面
            document.getElementById('editor').scrollTop = 0;
            // 如果是手機版，順便把整個網頁也捲到最上面，方便編輯
            if (window.innerWidth <= 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
            
        } catch (e) { alert("開啟失敗"); }
    }

    function resetKbForm() {
        document.getElementById('kb-id').value=''; document.getElementById('kb-title').value=''; 
        document.getElementById('kb-big').value=''; document.getElementById('kb-mid').value=''; 
        document.getElementById('btn-kb-del').style.display = 'none';
        document.getElementById('kb-pub').checked = true;
        document.getElementById('editor').innerHTML = '<p>請在此開始撰寫...</p>';
        history = [document.getElementById('editor').innerHTML]; historyIndex = 0;
        spacingCfg = { lh: 1.6, pmb: 0.5, lmtb: 0.5, limb: 0.3 }; applySpacingToEditor();
    }

    async function saveArticle(isAuto = false) {
        const editor = document.getElementById('editor');
        const sourceArea = document.getElementById('source-area');
        if (sourceArea.style.display === 'block') {
            const parser = new DOMParser(); const doc = parser.parseFromString(sourceArea.value, 'text/html');
            const wrapper = doc.querySelector('.peiyu-article'); editor.innerHTML = wrapper ? wrapper.innerHTML : sourceArea.value;
        }
        // 🔥 終極防呆：儲存前，強制掃描畫面上最新的頁籤標題，寫死進 HTML 屬性裡
        editor.querySelectorAll('.peiyu-tab-section').forEach(sec => {
            const titleSpan = sec.querySelector('.peiyu-tab-title-edit');
            if (titleSpan) {
                // 拔除可能產生的垃圾換行符號，只保留純文字
                let pureText = titleSpan.textContent.replace(/[\r\n]+/g, '').trim();
                sec.setAttribute('data-tab-title', pureText);
            }
        });

        const exportHTML = `<style class="peiyu-dynamic-config" data-cfg='${JSON.stringify(spacingCfg)}'>
            .peiyu-article { line-height: ${spacingCfg.lh}; font-size: 16px; color: #2c3e50; font-family: -apple-system, "Microsoft JhengHei", sans-serif; -webkit-text-size-adjust: 100%; }
            .peiyu-article * { -webkit-text-size-adjust: 100%; }
            .peiyu-article p, .peiyu-article div:not([class]) { margin-top: 0; margin-bottom: ${spacingCfg.pmb}em; }
            .peiyu-article h1, .peiyu-article h2, .peiyu-article h3, .peiyu-article h4, .peiyu-article h5, .peiyu-article h6 { margin-top: 1.2em; margin-bottom: 0.5em; line-height: 1.4; font-weight: bold; }
            .peiyu-article h1+h1, .peiyu-article h2+h2, .peiyu-article h3+h3, .peiyu-article h4+h4, .peiyu-article h5+h5, .peiyu-article h6+h6 { margin-top: 0; }
            .peiyu-article ul, .peiyu-article ol { margin-top: ${spacingCfg.lmtb}em; margin-bottom: ${spacingCfg.pmb}em; padding-left: 1.5em; }
            .peiyu-article li { margin-bottom: ${spacingCfg.limb}em; }
            .peiyu-article li > p, .peiyu-article li > div:not([class]) { margin-bottom: 0; display: inline; }
            .peiyu-article table { border-collapse: collapse; width: 100%; max-width: 100% !important; box-sizing: border-box !important; table-layout: fixed !important; }
            .peiyu-article table td, .peiyu-article table th { vertical-align: middle; padding: 8px 12px; word-wrap: break-word !important; overflow-wrap: break-word !important; max-width: 100% !important; box-sizing: border-box !important; }
            .peiyu-article .resizable-wrapper { max-width: 100% !important; clear: both; box-sizing: border-box !important; }
            .peiyu-article img { max-width: 100% !important; height: auto !important; box-sizing: border-box !important; }
            
            .peiyu-tabs-wrapper { width: 100% !important; background: transparent !important; border: none !important; margin: 40px 0 !important; }
            .peiyu-tab-group-header { background: transparent !important; display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px 15px 5px; border: none !important; }
            .peiyu-tab-container { background: transparent !important; padding: 0 !important; width: 100% !important; border: none !important; }
            .peiyu-tab-body { background: transparent !important; width: 100% !important; border: none !important; }
            
            @media (max-width: 768px) and (orientation: portrait) {
                .peiyu-article table { width: 100% !important; margin-left: 0 !important; margin-right: 0 !important; }
                .peiyu-article .resizable-wrapper, .peiyu-article img { margin-left: 0 !important; margin-right: 0 !important; }
            }
        </style>
        <div class="peiyu-article">\n${editor.innerHTML}\n</div>`;

        const p = { title: document.getElementById('kb-title').value.trim(), big_category: document.getElementById('kb-big').value.trim(), mid_category: document.getElementById('kb-mid').value.trim(), is_published: document.getElementById('kb-pub').checked, body: exportHTML.trim() };
        const id = document.getElementById('kb-id').value;
        if (!p.title || !p.big_category) return alert("❌ 標題與大分類為必填！");

        const saveBtn = document.querySelector('button[onclick="saveArticle()"]');
        const originalText = saveBtn.innerText; saveBtn.innerText = "⏳ 儲存中..."; saveBtn.disabled = true; saveBtn.style.opacity = "0.7"; saveBtn.style.cursor = "not-allowed";
        
        try { 
            if (id) { await myDB.from('kb_articles').update(p).eq('id', id); } 
            else { const { data } = await myDB.from('kb_articles').select('sort_order').order('sort_order', { ascending: false }).limit(1); p.sort_order = (data && data.length) ? data[0].sort_order + 1 : 1; await myDB.from('kb_articles').insert([p]); } 
            if (!isAuto) alert("✅ 文章已成功儲存！");
        else console.log("✅ 系統已自動背景儲存");fetchKbData(); if (!id) resetKbForm(); 
        } catch (e) { alert("❌ 儲存失敗: " + e.message); } 
        finally { saveBtn.innerText = originalText; saveBtn.disabled = false; saveBtn.style.opacity = "1"; saveBtn.style.cursor = "pointer"; }
    }

        const s = document.getElementById('source-area'); const editor = document.getElementById('editor'); 
        if (s.style.display === 'none' || s.style.display === '') { 
            
            // 🔥 1. 同步最新頁籤標題 (避免切換到 HTML 時名字沒變)
            editor.querySelectorAll('.peiyu-tab-section').forEach(sec => {
                const titleSpan = sec.querySelector('.peiyu-tab-title-edit');

                    let pureText = titleSpan.textContent.replace(/[\r\n]+/g, '').trim();
                    sec.setAttribute('data-tab-title', pureText);
                }
            });

            // 🔥 2. 生成「去黃透明版」的匯出代碼
            const exportHTML = `<style class="peiyu-dynamic-config" data-cfg='${JSON.stringify(spacingCfg)}'>
                .peiyu-article { line-height: ${spacingCfg.lh}; font-size: 16px; color: #2c3e50; font-family: -apple-system, "Microsoft JhengHei", sans-serif; -webkit-text-size-adjust: 100%; }
                .peiyu-article * { -webkit-text-size-adjust: 100%; }
                .peiyu-article p, .peiyu-article div:not([class]) { margin-top: 0; margin-bottom: ${spacingCfg.pmb}em; }
                .peiyu-article h1, .peiyu-article h2, .peiyu-article h3, .peiyu-article h4, .peiyu-article h5, .peiyu-article h6 { margin-top: 1.2em; margin-bottom: 0.5em; line-height: 1.4; font-weight: bold; }
                .peiyu-article h1+h1, .peiyu-article h2+h2, .peiyu-article h3+h3, .peiyu-article h4+h4, .peiyu-article h5+h5, .peiyu-article h6+h6 { margin-top: 0; }
                .peiyu-article ul, .peiyu-article ol { margin-top: ${spacingCfg.lmtb}em; margin-bottom: ${spacingCfg.pmb}em; padding-left: 1.5em; }
                .peiyu-article li { margin-bottom: ${spacingCfg.limb}em; }
                .peiyu-article li > p, .peiyu-article li > div:not([class]) { margin-bottom: 0; display: inline; }
                .peiyu-article table { border-collapse: collapse; width: 100%; max-width: 100% !important; box-sizing: border-box !important; table-layout: fixed !important; }
                .peiyu-article table td, .peiyu-article table th { vertical-align: middle; padding: 8px 12px; word-wrap: break-word !important; overflow-wrap: break-word !important; max-width: 100% !important; box-sizing: border-box !important; }
                .peiyu-article .resizable-wrapper { max-width: 100% !important; clear: both; box-sizing: border-box !important; }
                .peiyu-article img { max-width: 100% !important; height: auto !important; box-sizing: border-box !important; }
                
                .peiyu-tabs-wrapper { width: 100% !important; background: transparent !important; border: none !important; margin: 40px 0 !important; }

                .peiyu-tab-container { background: transparent !important; padding: 0 !important; width: 100% !important; border: none !important; }
                .peiyu-tab-body { background: transparent !important; width: 100% !important; border: none !important; }

                @media (max-width: 768px) and (orientation: portrait) {
                    .peiyu-article table { width: 100% !important; margin-left: 0 !important; margin-right: 0 !important; }

                }
            </style><div class="peiyu-article">\n${editor.innerHTML}\n</div>`;
            
            s.value = exportHTML; s.style.display = 'block'; s.style.flex = '1'; s.style.height = ''; editor.style.display = 'none'; 
        } else { 
            const parser = new DOMParser(); const doc = parser.parseFromString(s.value, 'text/html'); const wrapper = doc.querySelector('.peiyu-article');
            editor.innerHTML = wrapper ? wrapper.innerHTML : s.value; s.style.display = 'none'; editor.style.display = ''; saveHistory(); 
        } 
    }
    

    // --- 編輯器核心 ---
    let spacingCfg = { lh: 1.6, pmb: 0.5, lmtb: 0.5, limb: 0.3 };
    // 🌟 編輯器內部預覽 CSS (忠實呈現版，僅直式強制保護)
    function applySpacingToEditor() { 
        const css = `#editor { line-height: ${spacingCfg.lh}; -webkit-text-size-adjust: 100%; } 
        #editor * { -webkit-text-size-adjust: 100%; } 
        #editor p, #editor div:not([class]) { margin-top: 0; margin-bottom: ${spacingCfg.pmb}em; } 
        #editor h1, #editor h2, #editor h3, #editor h4, #editor h5, #editor h6 { margin-top: 1.2em; margin-bottom: 0.5em; line-height: 1.4; font-weight: bold; } 
        #editor h1+h1, #editor h2+h2, #editor h3+h3, #editor h4+h4, #editor h5+h5, #editor h6+h6 { margin-top: 0; } 
        #editor ul, #editor ol { margin-top: ${spacingCfg.lmtb}em; margin-bottom: ${spacingCfg.pmb}em; padding-left: 1.5em; }

    let history = ['<p>請在此開始撰寫...</p>']; let historyIndex = 0; let typingTimeout;
    // 🌟 1. 歷史存檔引擎 (修復：有反白時絕對不插標記，保護反藍)
    function saveHistory() {
        const editor = document.getElementById('editor'); if (!editor) return; 
        const sel = window.getSelection(); 
        let markedHTML = editor.innerHTML;
        
        // 🔥 關鍵修正：只有「游標閃爍」(沒有反白文字) 時，才去插入游標記號！
        if (sel.rangeCount > 0 && editor.contains(sel.anchorNode) && sel.isCollapsed) {
            try { 
                const range = sel.getRangeAt(0); 
                const marker = document.createElement("span"); marker.id = "cursor-marker"; marker.style.display = "none"; 
                range.insertNode(marker); 
                markedHTML = editor.innerHTML; 
                marker.remove(); 
            } catch(e) {}
        }
        
        const currentPure = markedHTML.replace(/<span id="cursor-marker".*?><\/span>/g, ""); 
        const lastPure = history[historyIndex] ? history[historyIndex].replace(/<span id="cursor-marker".*?><\/span>/g, "") : "";
        if (currentPure !== lastPure) { 
            if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1); 
            history.push(markedHTML); 
            if (history.length > 50) history.shift(); else historyIndex = history.length - 1; 
        }
    }
    
    function customUndo() { clearTimeout(typingTimeout); saveHistory(); if (historyIndex > 0) { historyIndex--; applyHistoryState(); } }
    function customRedo() { clearTimeout(typingTimeout); if (historyIndex < history.length - 1) { historyIndex++; applyHistoryState(); } }
    function applyHistoryState() {
        const editor = document.getElementById('editor'); editor.innerHTML = history[historyIndex]; const marker = document.getElementById('cursor-marker');
        if (marker) { const range = document.createRange(); const sel = window.getSelection(); range.setStartAfter(marker); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); marker.remove(); }
        editor.focus({ preventScroll: true });
    }

    // 🌟 3. 恢復反白記憶
    function restoreSelection() {
        const editor = document.getElementById('editor');
        editor.focus({ preventScroll: true });
        if (savedRange) { 
            const sel = window.getSelection(); 
            sel.removeAllRanges(); 
            sel.addRange(savedRange); 
        } else { 
            const range = document.createRange(); 
            range.selectNodeContents(editor); 
            range.collapse(false); 
            const sel = window.getSelection(); 
            sel.removeAllRanges(); 
            sel.addRange(range);

    }

    // 🌟 5. 首行縮排 (維持原樣)
    function applyFirstLineIndent() { 
        const sel = window.getSelection(); if (!sel.rangeCount) return; 
        let node = sel.focusNode; if(node.nodeType === 3) node = node.parentNode; 
        while(node && node.id !== 'editor' && !['P','DIV','LI'].includes(node.tagName)) node = node.parentNode;

    // 🌟 強制 DOM 插入法：絕對保留所有樣式，拒絕瀏覽器雞婆刪除
    function insertHtml(html) {
        restoreSelection(); const editor = document.getElementById('editor'); editor.focus({ preventScroll: true }); 
        const sel = window.getSelection();
        if (sel.getRangeAt && sel.rangeCount) { 
            const range = sel.getRangeAt(0); 
            range.deleteContents(); 
            const el = document.createElement("div"); el.innerHTML = html; 
            let frag = document.createDocumentFragment(), node, lastNode; 
            while ((node = el.firstChild)) lastNode = frag.appendChild(node); 
            
            // 直接物理安插節點，不經過瀏覽器過濾
            range.insertNode(frag); 
            
            if (lastNode) { 
                // 為了防止游標被困在外框裡面，插入後自動在後面補一個看不見的空白字元
                if (lastNode.nodeType === 1 && lastNode.tagName === 'SPAN') {
                    const space = document.createTextNode('\u00A0');
                    lastNode.parentNode.insertBefore(space, lastNode.nextSibling);
                    range.setStartAfter(space);
                } else {
                    range.setStartAfter(lastNode); 
                }
                range.collapse(true); 
                sel.removeAllRanges(); 
                sel.addRange(range); 
            } 
        } else {
            editor.innerHTML += html;
        }
        saveHistory(); 
    }

    // 🌟 智慧分流除髒引擎
    // 🌟 智慧分流除髒引擎 (終極無差別格殺版)
    window.executeClean = function(mode) {
        saveSelection(); 
        const editor = document.getElementById('editor'); 
        let html = editor.innerHTML; 
        const parser = new DOMParser(); 
        const doc = parser.parseFromString(html, 'text/html');

        let cleanCount = 0;

        // 定義我們系統「合法」的 class，其他的通通殺掉
        const validClasses = ['peiyu-article', 'peiyu-table', 'peiyu-obj', 'peiyu-tabs-wrapper', 'peiyu-tab-group-header', 'peiyu-tab-container', 'peiyu-tab-section', 'peiyu-tab-label-row', 'peiyu-tab-title-edit', 'peiyu-tab-body', 'peiyu-block', 'resizable-wrapper', 'kb-btn-del-tab', 'peiyu-custom-box'];
        doc.querySelectorAll('*').forEach(el => {
            let isModified = false;

            // 🎨 1. 背景色除髒 (僅清除 inline 背景色)
            if (mode === 'bg' || mode === 'all') {
                if (el.style.backgroundColor) { el.style.removeProperty('background-color'); isModified = true; }
                if (el.style.background) { el.style.removeProperty('background'); isModified = true; }
            }

            // 🤖 2. 除 AI 格式 (無差別格殺外部 Class 與隱藏屬性)
            if (mode === 'ai' || mode === 'all') {
                // 殺掉所有不在「合法白名單」內的 class
                if (el.className && typeof el.className === 'string') {
                    const originalClass = el.className;
                    const cleanClasses = el.className.split(' ').filter(c => validClasses.includes(c)).join(' '); 
                    if (cleanClasses !== originalClass) {
                        if (cleanClasses) el.className = cleanClasses; else el.removeAttribute('class'); 
                        isModified = true;
                    }
                }
                
                // 殺掉詭異的 AI 屬性
                Array.from(el.attributes).forEach(attr => {
                    if (!['class', 'style', 'src', 'href', 'width', 'height', 'colspan', 'rowspan', 'data-tab-title', 'data-nat-w', 'contenteditable'].includes(attr.name)) {
                        el.removeAttribute(attr.name);
                        isModified = true;
                    }
                });
            }

            // 🔲 3. 表格除髒 (解開寬高死鎖 + 扒光多餘間距與框線設定)
            if (mode === 'table' || mode === 'all') {
                if (['TABLE', 'TBODY', 'TR', 'TH', 'TD'].includes(el.tagName)) {
                    // 1. 殺掉所有寫死的寬高
                    if (el.style.width) { el.style.removeProperty('width'); isModified = true; }
                    if (el.style.height) { el.style.removeProperty('height'); isModified = true; }
                    if (el.style.minWidth) { el.style.removeProperty('min-width'); isModified = true; }
                    if (el.style.maxWidth) { el.style.removeProperty('max-width'); isModified = true; }
                    
                    // 2. 針對格子 (TD/TH) 進行特種清理
                    if (el.tagName === 'TD' || el.tagName === 'TH') {
                        el.style.whiteSpace = 'normal';
                        el.style.wordBreak = 'break-all';
                        
                        // 🔥 殺光所有多餘的 padding (內距)，讓 CSS 全域設定來接管
                        if (el.style.padding) { el.style.removeProperty('padding'); isModified = true; }
                        if (el.style.paddingLeft) { el.style.removeProperty('padding-left'); isModified = true; }
                        if (el.style.paddingRight) { el.style.removeProperty('padding-right'); isModified = true; }
                        if (el.style.paddingTop) { el.style.removeProperty('padding-top'); isModified = true; }
                        if (el.style.paddingBottom) { el.style.removeProperty('padding-bottom'); isModified = true; }
                        
                        // 🔥 殺光所有單獨寫在格子上的邊框 (例如 border: medium;)
                        if (el.style.border) { el.style.removeProperty('border'); isModified = true; }
                        if (el.style.borderWidth) { el.style.removeProperty('border-width'); isModified = true; }
                        if (el.style.borderStyle) { el.style.removeProperty('border-style'); isModified = true; }
                        if (el.style.borderColor) { el.style.removeProperty('border-color'); isModified = true; }
                        
                        // 🔥 殺光 textAlign，避免裡面的內容被強制亂對齊
                        if (el.style.textAlign) { el.style.removeProperty('text-align'); isModified = true; }
                    }

                    // 3. 表格外框也要清理浮動與多餘間距
                    if (el.tagName === 'TABLE') {
                        if (el.style.float) { el.style.removeProperty('float'); isModified = true; }
                        if (el.style.margin) { el.style.removeProperty('margin'); isModified = true; }
                        if (el.style.clear) { el.style.removeProperty('clear'); isModified = true; }
                    }
                }
            }

            // 📝 4. 文字除髒 (清除外部殘留的間距、行高)
            if (mode === 'text' || mode === 'all') {
                if (el.style.lineHeight) { el.style.removeProperty('line-height'); isModified = true; }
                if (el.style.marginBlock) { el.style.removeProperty('margin-block'); isModified = true; }
                if (el.style.letterSpacing) { el.style.removeProperty('letter-spacing'); isModified = true; }
                if (el.style.margin && !el.classList.contains('resizable-wrapper')) { el.style.removeProperty('margin'); isModified = true; }
                if (el.style.marginTop) { el.style.removeProperty('margin-top'); isModified = true; }
                if (el.style.marginBottom) { el.style.removeProperty('margin-bottom'); isModified = true; }
                if (el.style.padding && !el.closest('.peiyu-table') && !el.classList.contains('peiyu-block')) { el.style.removeProperty('padding'); isModified = true; }
                
                if (mode === 'text') { 
                    if (el.style.fontFamily) { el.style.removeProperty('font-family'); isModified = true; }
                    if (el.style.fontSize) { el.style.removeProperty('font-size'); isModified = true; }
                    if (el.tagName === 'FONT') { el.removeAttribute('face'); el.removeAttribute('size'); el.removeAttribute('color'); isModified = true; }
                }
            }

            if (el.getAttribute('style') === '') {
                el.removeAttribute('style');
                isModified = true;
            }

            if (isModified) cleanCount++;
        });

        // 👻 共通掃蕩：剝除無用的 div 與 span 外套
        if (mode === 'all' || mode === 'ai' || mode === 'text') {
            // 先清空幽靈標籤
            doc.querySelectorAll('div, p, span').forEach(el => {
                if (el.textContent.trim() === '' && el.querySelectorAll('img, table, iframe, br').length === 0) {
                    el.remove(); cleanCount++;
                }
            });

            // 剝除沒有屬性的 div 和 span
            let hasUnwrapped = true;
            while (hasUnwrapped) {
                hasUnwrapped = false;
                doc.querySelectorAll('div, span').forEach(el => {
                    // 如果它是空的 span (沒有 style 沒有 class)
                    if (el.attributes.length === 0) {
                        const parent = el.parentNode;
                        if(parent) {
                            while (el.firstChild) parent.insertBefore(el.firstChild, el);
                            parent.removeChild(el);
                            hasUnwrapped = true; cleanCount++;
                        }
                    }
                });
            }
        }

        editor.innerHTML = doc.body.innerHTML; 
        saveHistory(); 
        document.getElementById('config-modal').style.display = 'none'; // 關閉面板

        const modeNames = { 'all': '🧨 全部', 'ai': '🤖 AI 格式', 'table': '🔲 表格', 'text': '📝 文字', 'bg': '🎨 背景色' };
        alert(`✨ ${modeNames[mode]} 除髒完成！\n\n成功清理了 ${cleanCount} 個項目。`);
    };

    async function deleteGalleryImage(fileName) {
        if (!confirm(`確定要永久刪除「${fileName}」嗎？\n注意：如果已有文章使用此圖片，將會破圖！`)) return;

    async function uploadToDB(input){ 
        const file = input.files[0]; if(!file) return; 
        const btn = document.querySelector('.editor-gallery-header button[onclick*="upload-input"]');
        const nameInput = document.getElementById('custom-img-name'); const originalText = btn.innerHTML;
        let rawName = nameInput.value.trim() || file.name.split('.').slice(0, -1).join('.');
        const cleanName = rawName.replace(/[^a-z0-9]/gi, '_').toLowerCase(); const finalID = `art_${Date.now()}_${cleanName}`;
        const targetBucket = 'kb-images'; const dbCategory = 'kb_asset'; const fName = `${finalID}.jpg`;

        btn.innerHTML = "⏳ 處理中..."; btn.disabled = true;

        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image(); img.src = e.target.result;
            img.onload = function() {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                const MAX = 1200; let w = img.width, h = img.height; 
                if(w > MAX || h > MAX){ if(w > h) { h *= MAX/w; w = MAX; } else { w *= MAX/h; h = MAX; } }
                cvs.width = w; cvs.height = h; ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
                cvs.toBlob(async function(blob){
                    try {
                        const { error: storageErr } = await myDB.storage.from(targetBucket).upload(fName, blob, { upsert: true });
                        if(storageErr) throw storageErr;
                        const { data: urlData } = myDB.storage.from(targetBucket).getPublicUrl(fName); const publicUrl = urlData.publicUrl;
                        await myDB.from('site_content').insert([{ title: rawName, category: dbCategory, image_url: publicUrl, body: 'asset' }]);
                        insertGalleryImage(publicUrl); 
                        btn.innerHTML = originalText; btn.disabled = false; nameInput.value = ''; input.value = ''; closeGallery();
                    } catch (err) { alert("插入失敗：" + err.message); btn.innerHTML = originalText; btn.disabled = false; }
                }, 'image/jpeg', 0.85); 
            }
        }
    }

        if (editor) {
            // 打字時自動存檔
            editor.addEventListener('input', () => { clearTimeout(typingTimeout); typingTimeout = setTimeout(saveHistory, 500); });
            
            // 🔥 終極修復：強制接管鍵盤 Ctrl+Z，解決「上一步變貼上亂碼」的問題！
            // 🔥 終極修復：強制接管鍵盤捷徑 (復原、重做、純文字貼上)
            editor.addEventListener('keydown', function(e) {
                // 攔截 Ctrl+Z / Cmd+Z (復原)
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    e.preventDefault(); 
                    if (e.shiftKey) customRedo();
                    else customUndo();
                }
                // 攔截 Ctrl+Y / Cmd+Y (重做)
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                    e.preventDefault(); 
                    customRedo();
                }
                
                // 🚀 強制綁定 Cmd+Shift+V / Ctrl+Shift+V 為「純文字貼上」
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'v') {
                    e.preventDefault(); // 擋掉瀏覽器的遲鈍反應
                    
                    // 強制讀取剪貼簿的純文字內容
                    navigator.clipboard.readText().then(text => {
                        // 將純文字插入游標位置
                        document.execCommand('insertText', false, text);
                        saveHistory();
                    }).catch(err => {
                        alert("⚠️ 您的瀏覽器安全層級較高，阻擋了快捷鍵貼上。\n請改用「滑鼠右鍵 ➔ 僅貼純文字」！");

                if (sel.rangeCount > 0 && sel.toString().trim().length > 0) {
                    const range = sel.getRangeAt(0);
                    if (editor.contains(range.commonAncestorContainer)) {
                        const rect = range.getBoundingClientRect();
                        
                        editBadge.style.display = 'flex';
                        editBadge.style.top = (rect.top - 35) + 'px'; 
                        editBadge.style.left = rect.left + 'px';
                        pendingTargetType = 'text';

                        // 判斷反白的文字是不是在表格裡面
                        let node = range.commonAncestorContainer;
                        let parentTable = node.nodeType === 3 ? node.parentNode.closest('table') : node.closest('table');
                        
                        const btnMain = document.getElementById('btn-badge-main');
                        const btnTable = document.getElementById('btn-badge-table');

                        btnMain.style.display = 'flex'; // 反白文字一定顯示紅筆 (因為要叫出文字工具列)
                        
                        if (parentTable) {
                            btnTable.style.display = 'flex'; // 在表格內就追加藍色按鈕
                            currentTarget = parentTable; // 偷偷把表格記下來，讓藍色按鈕點下去不會當機！
                        } else {
                            btnTable.style.display = 'none'; // 在外面就把它藏好
                            currentTarget = null;
                        }

                        return true;
                    }
                }
                return false;
            }

            editor.addEventListener('click', function(e) { 
                if (e.target.closest('#edit-badge') || e.target.closest('#float-menu')) return;
                
                document.querySelectorAll('.obj-selected').forEach(el => el.classList.remove('obj-selected')); 
                floatMenu.style.display = 'none'; 
                editBadge.style.display = 'none';
                currentTarget = null; 
                currentTargetCell = null;
                pendingTargetType = null;

                let targetImg = e.target.closest('img'); 
                let targetCell = e.target.closest('td, th');
                let targetTable = e.target.closest('table');
                let targetTabs = (e.target.closest('.peiyu-tab-label-row') || e.target.closest('.peiyu-tab-group-header') || e.target.classList.contains('peiyu-tabs-wrapper')) ? e.target.closest('.peiyu-tabs-wrapper') : null;
                
                // 🔥 終極相容版積木雷達
                let rawBlock = e.target.closest('.peiyu-block');
                
                // 🚑 舊版標題救援：如果點到了沒有 peiyu-block 的 h2, h3，強制把它當作積木！
                if (!rawBlock) {
                    let heading = e.target.closest('h2, h3');
                    if (heading) {
                        // 找看看它外面有沒有包著一層用來置中的 div
                        let parentDiv = heading.parentElement;
                        if (parentDiv && parentDiv.tagName === 'DIV') {
                            rawBlock = parentDiv;
                        } else {
                            rawBlock = heading;
                        }
                        // 當場幫它貼上合法標籤，以後就好抓了！
                        rawBlock.classList.add('peiyu-block', 'peiyu-obj');
                    }
                }

                let targetBlock = null;
                if (rawBlock) {
                    // 檢查外面是不是又包了一層純粹用來置中的 div (有時候會出現兩層)
                    let parent = rawBlock.parentElement;
                    if (parent && parent.tagName === 'DIV' && parent.style.textAlign === 'center' && parent.children.length === 1) {
                        targetBlock = parent; 
                    } else {
                        targetBlock = rawBlock; 
                    }
                }

                // 如果點到了這些特殊物件，就不算純文字反白
                if (!targetImg && !targetTable && !targetTabs && !targetBlock && checkTextSelection()) return;
                if (!targetImg && checkTextSelection()) return;

                // 🔥 獨立出一個計算徽章位置的智慧函數 (區分紅藍按鈕顯示邏輯)
                function setBadgePosition(rect, targetType, isInsideTable) {
                    editBadge.style.display = 'flex';
                    let topPos = rect.top - 32; 
                    if (topPos < 60) topPos = rect.top + 5; 
                    
                    editBadge.style.top = topPos + 'px';
                    editBadge.style.left = (rect.left - 2) + 'px'; 

                    const btnMain = document.getElementById('btn-badge-main');
                    const btnTable = document.getElementById('btn-badge-table');

                    if (targetType === 'table') {
                        // 🔵 如果點擊的是純表格格子，只顯示「藍色表格」圖示！
                        btnMain.style.display = 'none';
                        btnTable.style.display = 'flex';
                    } else {
                        // 🔴 如果點擊的是圖片/積木/頁籤，一定顯示紅筆。如果在表格內，追加顯示藍色表格
                        btnMain.style.display = 'flex';
                        btnTable.style.display = isInsideTable ? 'flex' : 'none';
                    }
                }

                // 🌟 優先權調整：先判定圖片
                if (targetImg) { 
                    let wrapper = targetImg.closest('.resizable-wrapper');
                    if (!wrapper) {
                        let oldW = targetImg.getAttribute('width') || targetImg.style.width || '100%';
                        if (oldW && !oldW.includes('%') && !oldW.includes('px') && !oldW.includes('auto')) { oldW += 'px'; }
                        wrapper = document.createElement('div'); wrapper.className = 'resizable-wrapper peiyu-obj';
                        wrapper.style.cssText = `display:block; width:${oldW}; max-width:100%; margin:15px auto; clear:both;`;
                        targetImg.style.width = '100%'; targetImg.style.height = 'auto'; targetImg.style.display = 'block'; targetImg.removeAttribute('width'); 
                        targetImg.parentNode.insertBefore(wrapper, targetImg); wrapper.appendChild(targetImg);
                    }
                    currentTarget = wrapper; 
                    pendingTargetType = 'image';
                    currentTarget.classList.add('obj-selected');
                    setBadgePosition(currentTarget.getBoundingClientRect(), 'image', currentTarget.closest('table') !== null);
                } 
                // 🌟 優先權調整：再來判定是否為魔法積木 (主副標、警告框、卡片)
                else if (targetBlock) { 
                    currentTarget = targetBlock;
                    pendingTargetType = 'block';
                    currentTarget.classList.add('obj-selected');
                    setBadgePosition(currentTarget.getBoundingClientRect(), 'block', currentTarget.closest('table') !== null);
                }
                // 🌟 優先權調整：再來判定是否為內文頁籤
                else if (targetTabs) { 
                    currentTarget = targetTabs;
                    pendingTargetType = 'tabs';
                    currentTarget.classList.add('obj-selected');
                    setBadgePosition(currentTarget.getBoundingClientRect(), 'tabs', currentTarget.closest('table') !== null);
                }
                // 🌟 優先權調整：如果以上都不是，最後才判定為表格格子
                else if (targetCell && targetTable) { 
                    targetTable.classList.add('peiyu-table', 'peiyu-obj');
                    if(targetTable.style.display === 'block') targetTable.style.display = 'table';
                    currentTarget = targetTable; 
                    currentTargetCell = targetCell; 
                    pendingTargetType = 'table';
                    
                    targetCell.classList.add('obj-selected'); 
                    setBadgePosition(targetCell.getBoundingClientRect(), 'table', false); 
                }
            });

            // 支援用鍵盤 (Shift+方向鍵) 反白文字也能跳出徽章
            editor.addEventListener('keyup', function(e) {
                if (e.key === 'Shift' || e.shiftKey || e.key.includes('Arrow')) {
                    if (!checkTextSelection()) {
                        editBadge.style.display = 'none';
                        floatMenu.style.display = 'none';
                    }
                }
            });

            // 🌟 嚴格交互 3：分辨點擊的是紅筆還是藍表格
            editBadge.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                const rect = editBadge.getBoundingClientRect();
                
                if (e.target.closest('#btn-badge-table')) {
                    // 🔵 點擊藍色按鈕：瞬間把目標切換成外層表格！
                    currentTarget = currentTarget.closest('table');
                    pendingTargetType = 'table';
                    
                    // 把紅框轉移到外層表格上
                    document.querySelectorAll('.obj-selected').forEach(el => el.classList.remove('obj-selected'));
                    currentTarget.classList.add('obj-selected');
                    
                    showFloatMenu(rect.left, rect.top + 35, 'table');
                    editBadge.style.display = 'none';
                } 
                else if (e.target.closest('#btn-badge-main')) {
                    // 🔴 點擊紅色按鈕：正常編輯目前的物件
                    if(pendingTargetType) {
                        showFloatMenu(rect.left, rect.top + 35, pendingTargetType);
                        editBadge.style.display = 'none';
                    }
                }
            });

        }

        // 🌟 真正的剪貼簿複製引擎 (拷貝後可到處貼上)
        // 🌟 物理級神盾複製引擎：模擬人類反白複製，突破所有瀏覽器限制！
        window.modCopy = function() {
            if(!currentTarget) return;
            
            // 1. 建立一個看不見的神祕結界
            const tempDiv = document.createElement("div");
            tempDiv.contentEditable = true;
            tempDiv.style.cssText = "position:absolute; left:-9999px; top:-9999px; opacity:0;";
            
            // 2. 把目標的完美分身塞進去
            const clone = currentTarget.cloneNode(true);
            
            // 如果是文字外框 (span)，要在前後加上空白，防止貼上後游標卡死
            if (clone.tagName === 'SPAN') {
                tempDiv.appendChild(document.createTextNode('\u00A0'));
                tempDiv.appendChild(clone);
                tempDiv.appendChild(document.createTextNode('\u00A0'));
            } else {
                tempDiv.appendChild(clone);
            }
            
            document.body.appendChild(tempDiv);
            
            // 3. 模擬人類用滑鼠把它完美反白
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            
            // 4. 強制執行物理複製 (Ctrl+C)
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    floatMenu.style.display = 'none'; 
                    document.getElementById('edit-badge').style.display = 'none';
                    
                    const toast = document.createElement('div');
                    toast.innerText = "📋 已複製！請到想放的地方按貼上";
                    toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:50px; z-index:9999; font-size:14px; pointer-events:none; box-shadow:0 4px 15px rgba(0,0,0,0.2);";
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 2000);
                } else {
                    throw new Error('Copy failed');
                }
            } catch (err) {
                alert("❌ 瀏覽器阻擋了按鈕複製，請改用實體鍵盤 Ctrl+C");
            } finally {
                // 5. 毀屍滅跡，把神祕結界拆掉
                document.body.removeChild(tempDiv);
                sel.removeAllRanges();
                document.getElementById('editor').focus();
            }
        };

    function syncKbOrderKeys() {
        let c = false; if (!kbCatOrder.hide_note) { kbCatOrder.hide_note = []; c = true; }
        const ct = {}; cache.articles.forEach(a => { if (!ct[a.big_category]) ct[a.big_category] = new Set(); ct[a.big_category].add(a.mid_category); });
        Object.keys(ct).forEach(b => { if (!kbCatOrder.big.includes(b)) { kbCatOrder.big.push(b); c = true; } });
        Object.keys(ct).forEach(b => { if (!kbCatOrder.mid[b]) kbCatOrder.mid[b] = []; [...ct[b]].forEach(m => { if (!kbCatOrder.mid[b].includes(m)) { kbCatOrder.mid[b].push(m); c = true; } }); });
        if (c) saveKbOrderConfig();
    }    
    function renderKbTree() {
        const t = {}; cache.articles.forEach(a => { if (!t[a.big_category]) t[a.big_category] = {}; if (!t[a.big_category][a.mid_category]) t[a.big_category][a.mid_category] = []; t[a.big_category][a.mid_category].push(a); });
        document.getElementById('kb-tree').innerHTML = kbCatOrder.big.filter(b => t[b]).map(b => {
            const isHidden = (kbCatOrder.hide_note || []).includes(b); const noteIcon = isHidden ? '🔇' : '📢';
            const noteBtn = `<span onclick="toggleKbNote('${b}', event)" style="cursor:pointer; margin-right:8px; font-size:14px; opacity:0.8;" title="切換便利貼">${noteIcon}</span>`;
            const ms = (kbCatOrder.mid[b] || []).filter(m => t[b][m]).map(m => {
                const as = t[b][m].map(a => `<div class="article-item ${a.is_published ? '' : 'draft'}"><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveArt('${a.id}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveArt('${a.id}',1,event)">▼</button></div><span class="article-title-span" onclick="editKb('${a.id}')">📄 ${a.title}</span></div>`).join('');
                return `<details class="mid-cat" open><summary><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveMid('${b}','${m}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveMid('${b}','${m}',1,event)">▼</button></div>└ ${m}</summary>${as}</details>`;
            }).join('');
            return `<details class="big-cat" open><summary><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveBig('${b}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveBig('${b}',1,event)">▼</button></div>${noteBtn} 📂 ${b}</summary>${ms}</details>`;
        }).join('');
        document.getElementById('kb-big-list').innerHTML = kbCatOrder.big.map(v => `<option value="${v}">`).join('');
        const allMids = new Set(); Object.values(kbCatOrder.mid).forEach(a => a.forEach(m => allMids.add(m)));
        document.getElementById('kb-mid-list').innerHTML = [...allMids].map(v => `<option value="${v}">`).join('');
    }

    async function moveBig(n,d,e){e.stopPropagation();const i=kbCatOrder.big.indexOf(n);if(i===-1||i+d<0||i+d>=kbCatOrder.big.length)return;[kbCatOrder.big[i],kbCatOrder.big[i+d]]=[kbCatOrder.big[i+d],kbCatOrder.big[i]];renderKbTree();await saveKbOrderConfig();}
    async function moveMid(b,n,d,e){e.stopPropagation();const i=kbCatOrder.mid[b].indexOf(n);if(i===-1||i+d<0||i+d>=kbCatOrder.mid[b].length)return;[kbCatOrder.mid[b][i],kbCatOrder.mid[b][i+d]]=[kbCatOrder.mid[b][i+d],kbCatOrder.mid[b][i]];renderKbTree();await saveKbOrderConfig();}
    async function moveArt(id, dir, e) {
        e.stopPropagation(); const art = cache.articles.find(a => a.id === id); if (!art) return;
        const siblings = cache.articles.filter(a => a.big_category === art.big_category && a.mid_category === art.mid_category);
        const idx = siblings.findIndex(a => a.id === id); if (idx === -1 || idx + dir < 0 || idx + dir >= siblings.length) return;
        const temp = siblings[idx]; siblings[idx] = siblings[idx + dir]; siblings[idx + dir] = temp;
        const updates = siblings.map((a, index) => { a.sort_order = index; return { id: a.id, sort_order: index, title: a.title, big_category: a.big_category, mid_category: a.mid_category }; });
        cache.articles.sort((a, b) => a.sort_order - b.sort_order); renderKbTree();
        try { await myDB.from('kb_articles').upsert(updates, { onConflict: 'id' }); } catch (err) { alert("排序儲存失敗: " + err.message); }
    }    
    async function saveKbOrderConfig(){const{data}=await myDB.from('site_content').select('id').eq('title','kb_category_order').single();if(data)await myDB.from('site_content').update({content:kbCatOrder}).eq('id',data.id);else await myDB.from('site_content').insert([{category:'system_config',title:'kb_category_order',content:kbCatOrder}]);}
    async function toggleKbNote(cat, e) { e.stopPropagation(); if (!kbCatOrder.hide_note) kbCatOrder.hide_note = []; const idx = kbCatOrder.hide_note.indexOf(cat); if (idx > -1) kbCatOrder.hide_note.splice(idx, 1); else kbCatOrder.hide_note.push(cat); renderKbTree(); await saveKbOrderConfig(); }

        `;
        document.body.appendChild(fab);

        if (window.innerWidth <= 1024) fab.style.display = 'flex';
        window.addEventListener('resize', () => { if (window.innerWidth <= 1024) fab.style.display = 'flex'; else fab.style.display = 'none'; });

        const toolbarHeader = document.querySelector('.editor-sticky-header');
        if(toolbarHeader) toolbarHeader.classList.remove('show-drawer');

        // 🔥 關鍵防護 1：使用 mousedown / touchstart 攔截焦點轉移！
        // 這樣點擊筆的時候，編輯器就不會失去焦點，反白也就不會消失！
        fab.addEventListener('mousedown', function(e) {
            e.preventDefault(); 
        });
        fab.addEventListener('touchstart', function(e) {
            // 雖然是觸控，但也需要 preventDefault，避免觸發後續的失焦
            // 但因為我們還需要它觸發 click，所以不能完全擋死，
            // 只要把這個防護交給前面寫好的 saveSelection / restoreSelection 即可
        }, {passive: false});

        // 原本的點擊開關邏輯
        fab.addEventListener('click', function(e) {
            e.preventDefault(); 
            if(!toolbarHeader) return; 
            
            // 🔥 關鍵防護 2：在打開工具列前，手動叫回剛剛存好的反白狀態！
            restoreSelection();

            toolbarHeader.classList.toggle('show-drawer');
            if (toolbarHeader.classList.contains('show-drawer')) { 
                fab.innerHTML = '<i class="fas fa-times"></i>'; 
                fab.style.background = '#e74c3c'; 
                fab.style.borderColor = '#c0392b'; 
            } 
            else { 
                fab.innerHTML = '<i class="fas fa-pen"></i>'; 
                fab.style.background = 'var(--forest)'; 
                fab.style.borderColor = 'var(--accent)'; 
            }
        });
    }
        // 🌟 處理自訂右鍵選單的剪貼動作
    async function contextAction(action) {
        const contextMenu = document.getElementById('custom-context-menu');
        contextMenu.style.display = 'none';
        document.getElementById('editor').focus({ preventScroll: true });

        try {
            if (action === 'cut') {
                document.execCommand('cut');
            } else if (action === 'copy') {
                document.execCommand('copy');
            } else if (action === 'paste-rich') {
                // 放棄容易被擋的高級 API，直接用物理點擊觸發原生貼上
                // 這會自動喚醒我們上面寫的 editor.addEventListener('paste') 護盾！
                try {
                    const successful = document.execCommand('paste');
                    if (!successful) throw new Error("Browser denied paste");
                } catch(e) {
                    alert("⚠️ 您的瀏覽器安全限制阻擋了按鈕貼上。\n請直接在畫面上長按選擇「貼上」，或是使用鍵盤 Cmd+V / Ctrl+V！"); 
                }

    // 🌟 RGB 轉 HEX (供油漆刷抓取顏色使用)
    function rgb2hex(rgb) {
        if (!rgb || rgb === 'transparent' || rgb.includes('rgba(0, 0, 0, 0)') || rgb === 'inherit') return '';
        if (rgb.startsWith('#')) return rgb;
        let rgbArray = rgb.match(/\d+/g);
        if(!rgbArray || rgbArray.length < 3) return '';
        function hex(x) { return ("0" + parseInt(x).toString(16)).slice(-2); }
        return "#" + hex(rgbArray[0]) + hex(rgbArray[1]) + hex(rgbArray[2]);
    }

    // 🌟 狀態雷達 (透視眼版 + Word級混雜偵測)
    function updateToolbarState() {
        const editor = document.getElementById('editor');
        const sel = window.getSelection();
        if (!sel.rangeCount || !editor.contains(sel.anchorNode)) return;

        // 1. 偵測粗體、斜體、底線，並點亮對應按鈕
        ['bold', 'italic', 'underline'].forEach(cmd => {
            const isActive = document.queryCommandState(cmd);
            document.querySelectorAll(`button[onclick="exec('${cmd}')"]`).forEach(btn => {
                isActive ? btn.classList.add('active') : btn.classList.remove('active');
            });
        });

        // 🔥 X光深層鑽探：不管是不是全選，強迫往下挖到最深層的文字標籤！
        let range = sel.getRangeAt(0);
        let node = range.startContainer;
        // 如果抓到的是外層區塊，我們根據偏移量往內找
        if (node.nodeType === 1 && node.childNodes.length > range.startOffset) {
            node = node.childNodes[range.startOffset];
        }
        // 不斷往最深層、有文字的節點鑽下去，避開空幽靈
        while (node && node.nodeType === 1 && node.childNodes.length > 0) {
            let validChild = Array.from(node.childNodes).find(n => n.textContent.replace(/\u200B/g, '').trim() !== '');
            if (validChild) node = validChild;
            else break;
        }
        if (node && node.nodeType === 3) node = node.parentNode;
        if (!node || node === editor) return;

        // 🔥 殺手鐧：使用 getComputedStyle 讀取「絕對真實」的螢幕渲染狀態

        const computed = window.getComputedStyle(node);
        
        // 2. 透視基準字體
        let fontStr = computed.fontFamily.toLowerCase();
        let mappedFont = "sans-serif"; 
        if (fontStr.includes('mono') || fontStr.includes('courier')) mappedFont = "monospace";
        else if (fontStr.includes('noto serif tc') || fontStr.includes('ming') || fontStr.includes('song') || (fontStr.includes('serif') && !fontStr.includes('sans-serif'))) mappedFont = "'Noto Serif TC', serif";
        
        // 3. 透視基準大小
        let sizePx = parseFloat(computed.fontSize) || 16;
        let pt = sizePx * 0.75; 
        const pts = [10, 12, 14, 18, 24, 36];
        let mappedSize = pts.reduce((p, c) => Math.abs(c - pt) < Math.abs(p - pt) ? c : p).toString();

        // 🔥 核心升級：偵測「選取範圍內」是否有混雜多種格式
        let isMixedFont = false;
        let isMixedSize = false;
        
        if (!sel.isCollapsed) {
            const range = sel.getRangeAt(0);
            const container = range.commonAncestorContainer.nodeType === 3 ? range.commonAncestorContainer.parentNode : range.commonAncestorContainer;
            if (container && container.querySelectorAll) {
                let elements = container.querySelectorAll('*');
                for (let el of elements) {
                    if (sel.containsNode(el, true)) {
                        let comp = window.getComputedStyle(el);
                        
                        // 檢查字體是否不一致
                        let elFontStr = comp.fontFamily.toLowerCase();
                        let elMappedFont = "sans-serif";
                        if (elFontStr.includes('mono') || elFontStr.includes('courier')) elMappedFont = "monospace";
                        else if (elFontStr.includes('noto serif tc') || elFontStr.includes('ming') || elFontStr.includes('song') || (elFontStr.includes('serif') && !elFontStr.includes('sans-serif'))) elMappedFont = "'Noto Serif TC', serif";
                        if (elMappedFont !== mappedFont) isMixedFont = true;

                        // 檢查大小是否不一致
                        let elSizePx = parseFloat(comp.fontSize) || 16;
                        let elPt = elSizePx * 0.75;
                        let elMappedSize = pts.reduce((p, c) => Math.abs(c - elPt) < Math.abs(p - elPt) ? c : p).toString();
                        if (elMappedSize !== mappedSize) isMixedSize = true;
                    }
                }
            }
        }

        // 像 Word 一樣，如果格式混雜，下拉選單直接顯示空白 (跳回預設文字)
        if (isMixedFont) mappedFont = "";
        if (isMixedSize) mappedSize = "";

        document.querySelectorAll('.tb-select[onchange*="applyCustomFont"]').forEach(sel => sel.value = mappedFont);
        document.querySelectorAll('.tb-select[onchange*="applyCustomSize"]').forEach(sel => sel.value = mappedSize);

        // 4. 透視文字顏色
        let textColor = computed.color;
        let hexColor = rgb2hex(textColor) || '#2c3e50';
        document.querySelectorAll('input[onchange*="foreColor"]').forEach(inp => inp.value = hexColor);

        // 5. 透視背景顏色
        let bgNode = node;
        let bgColor = '';
        while (bgNode && bgNode !== editor) {
            let bg = window.getComputedStyle(bgNode).backgroundColor;
            if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') {
                bgColor = bg;
                break;
            }
            bgNode = bgNode.parentNode;
        }
        let hexBg = rgb2hex(bgColor) || '#ffffff';
        document.querySelectorAll('input[onchange*="applyHighlighter"]').forEach(inp => inp.value = hexBg);
    }

                if (validChild) node = validChild;

            if (!node || node === editor) return;

            // 🔥 換上透視眼 X 光，絕對精準抓取真實渲染狀態

            // 🔥 換上透視眼 X 光，絕對精準抓取真實渲染狀態
            const computed = window.getComputedStyle(node);
            
            // 抓字體
            let fontStr = computed.fontFamily.toLowerCase();
            let mappedFont = "sans-serif"; 
            if (fontStr.includes('mono') || fontStr.includes('courier')) mappedFont = "monospace";
            else if (fontStr.includes('noto serif tc') || fontStr.includes('ming') || fontStr.includes('song') || (fontStr.includes('serif') && !fontStr.includes('sans-serif'))) mappedFont = "'Noto Serif TC', serif";
            
            // 抓大小並精準換算 pt
            let sizePx = parseFloat(computed.fontSize) || 16;
            let pt = sizePx * 0.75;
            const pts = [10, 12, 14, 18, 24, 36];
            let mappedSize = pts.reduce((p, c) => Math.abs(c - pt) < Math.abs(p - pt) ? c : p).toString();
            
            // 抓顏色
            let hexColor = rgb2hex(computed.color) || '#2c3e50';
            
            // 抓背景色
            let bgNode = node; let hexBg = 'transparent';
            while (bgNode && bgNode !== editor) {
                let bg = window.getComputedStyle(bgNode).backgroundColor;
                if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') {
                    hexBg = rgb2hex(bg); break;

            formatPainterState.styles.fontName = mappedFont;

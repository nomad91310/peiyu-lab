        // 🌟 真正的剪貼簿複製引擎 (拷貝後可到處貼上)
        // 🌟 物理級神盾複製引擎：模擬人類反白複製，突破所有瀏覽器限制！
        window.modCopy = function() {
            if(!currentTarget) return;
            
            // 1. 建立一個看不見的神祕結界
            const tempDiv = document.createElement("div");
            tempDiv.contentEditable = true;
            tempDiv.style.cssText = "position:absolute; left:-9999px; top:-9999px; opacity:0;";
            
            // 2. 把目標的完美分身塞進去
            const clone = currentTarget.cloneNode(true);
            
            // 如果是文字外框 (span)，要在前後加上空白，防止貼上後游標卡死
            if (clone.tagName === 'SPAN') {
                tempDiv.appendChild(document.createTextNode('\u00A0'));
                tempDiv.appendChild(clone);
                tempDiv.appendChild(document.createTextNode('\u00A0'));
            } else {
                tempDiv.appendChild(clone);
            }
            
            document.body.appendChild(tempDiv);
            
            // 3. 模擬人類用滑鼠把它完美反白
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            
            // 4. 強制執行物理複製 (Ctrl+C)
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    floatMenu.style.display = 'none'; 
                    document.getElementById('edit-badge').style.display = 'none';
                    
                    const toast = document.createElement('div');
                    toast.innerText = "📋 已複製！請到想放的地方按貼上";
                    toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:50px; z-index:9999; font-size:14px; pointer-events:none; box-shadow:0 4px 15px rgba(0,0,0,0.2);";
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 2000);
                } else {
                    throw new Error('Copy failed');
                }
            } catch (err) {
                alert("❌ 瀏覽器阻擋了按鈕複製，請改用實體鍵盤 Ctrl+C");
            } finally {
                // 5. 毀屍滅跡，把神祕結界拆掉
                document.body.removeChild(tempDiv);
                sel.removeAllRanges();
                document.getElementById('editor').focus();
            }
        };

        window.modClone = function() {

        // 🌟 表格操作引擎 (支援精準插入、刪除單行單列、合併與拆分)
        window.modTable = function(action) { 
            if(!currentTarget || currentTarget.tagName !== 'TABLE') return; 
            
            // 全局刪除
            if(action === 'delete') { 
                nativeDeleteElement(currentTarget); 
                floatMenu.style.display = 'none'; 
                document.getElementById('edit-badge').style.display = 'none';
                saveHistory(); 
                return;
            } 
            
            // 防呆：接下來的操作都需要確保有選中一個「特定的格子」
            if (!currentTargetCell) return alert("請先點擊表格內的任一文字，再來進行操作！");

            const table = currentTarget;
            const cell = currentTargetCell;
            const row = cell.parentElement;
            const rIdx = row.rowIndex; // 目前在哪一列
            const cIdx = cell.cellIndex; // 目前在哪一行

            if (action === 'add-row-up') { 
                const newRow = table.insertRow(rIdx); 
                const cols = row.cells.length;
                for (let i=0; i<cols; i++) { 
                    const c = newRow.insertCell(); c.innerText = "文字"; c.style.cssText = cell.style.cssText; 
                } 
            } 
            else if (action === 'add-row-down') { 
                const newRow = table.insertRow(rIdx + (cell.rowSpan || 1)); 
                const cols = row.cells.length;
                for (let i=0; i<cols; i++) { 
                    const c = newRow.insertCell(); c.innerText = "文字"; c.style.cssText = cell.style.cssText; 
                } 
            } 
            else if (action === 'del-row') { 
                if (table.rows.length > 1) table.deleteRow(rIdx); 
                else nativeDeleteElement(table); // 剩最後一列就直接刪除表格
            } 
            else if (action === 'add-col-left') { 
                Array.from(table.rows).forEach(r => { 
                    let idx = Math.min(cIdx, r.cells.length);
                    const c = r.insertCell(idx); 
                    c.innerText = "文字"; c.style.cssText = cell.style.cssText; 
                }); 
            } 
            else if (action === 'add-col-right') { 
                Array.from(table.rows).forEach(r => { 
                    let idx = Math.min(cIdx + (cell.colSpan || 1), r.cells.length);
                    const c = r.insertCell(idx); 
                    c.innerText = "文字"; c.style.cssText = cell.style.cssText; 
                }); 
            } 
            else if (action === 'del-col') { 
                if (row.cells.length > 1) {
                    Array.from(table.rows).forEach(r => {
                        if (r.cells.length > cIdx) r.deleteCell(cIdx);
                    });
                } else {
                    nativeDeleteElement(table);
                }
            } 
            else if (action === 'merge-right') {
                const next = cell.nextElementSibling;
                if (next) {
                    cell.colSpan = (cell.colSpan || 1) + (next.colSpan || 1);
                    if (next.innerHTML.trim() && next.innerHTML !== '文字' && next.innerHTML !== '<br>') {
                        cell.innerHTML += '<br>' + next.innerHTML; // 把右邊格子的字接過來
                    }
                    next.remove();
                } else {
                    alert("右邊已經沒有格子可以合併了！");
                }
            }
            else if (action === 'merge-down') {
                const targetRowIdx = rIdx + (cell.rowSpan || 1);
                if (targetRowIdx < table.rows.length) {
                    const nextRow = table.rows[targetRowIdx];
                    const nextCell = nextRow.cells[cIdx]; // 抓正下方的格子
                    if (nextCell) {
                        cell.rowSpan = (cell.rowSpan || 1) + (nextCell.rowSpan || 1);
                        if (nextCell.innerHTML.trim() && nextCell.innerHTML !== '文字' && nextCell.innerHTML !== '<br>') {
                            cell.innerHTML += '<br>' + nextCell.innerHTML;
                        }
                        nextCell.remove();
                    } else {
                        alert("下方的格子結構已被改變，無法直接合併！");
                    }
                } else {
                    alert("下方已經沒有格子可以合併了！");
                }
            }
            else if (action === 'split') {
                let cSpan = cell.colSpan || 1;
                let rSpan = cell.rowSpan || 1;
                
                if (cSpan > 1) {
                    cell.colSpan = cSpan - 1;
                    const newCell = row.insertCell(cIdx + 1);
                    newCell.innerHTML = "文字";
                    newCell.style.cssText = cell.style.cssText;
                    newCell.colSpan = 1;
                    newCell.rowSpan = rSpan;
                } else if (rSpan > 1) {
                    cell.rowSpan = rSpan - 1;
                    const targetRowIdx = rIdx + rSpan - 1;
                    if (table.rows[targetRowIdx]) {
                        const newCell = table.rows[targetRowIdx].insertCell(cIdx);
                        newCell.innerHTML = "文字";
                        newCell.style.cssText = cell.style.cssText;
                        newCell.colSpan = cSpan;
                        newCell.rowSpan = 1;
                    }
                } else {
                    alert("這個格子已經是最小單位，無法再拆分囉！");
                }
            }
            
            saveHistory(); 
            // 如果刪除後格子不見了，稍微重置一下選單狀態
            if (action.includes('del') || action.includes('merge')) {
                floatMenu.style.display = 'none';
                document.getElementById('edit-badge').style.display = 'none';
            }
        }
        // 🌟 表格破版一鍵自救引擎
        window.fixTable = function() {
            if (!currentTarget || currentTarget.tagName !== 'TABLE') return;
            let fixedCount = 0;
            
            // 掃描表格內所有的格子
            currentTarget.querySelectorAll('td, th').forEach(cell => {
                // 1. 如果格子裡卡了魔法積木，把它暴力踢出表格上方！
                let blocks = cell.querySelectorAll('.peiyu-block');
                blocks.forEach(block => {
                    currentTarget.parentNode.insertBefore(block, currentTarget);
                    // 為了美觀，在被踢出去的積木後面補個換行
                    const br = document.createElement('p'); br.innerHTML = '<br>';
                    currentTarget.parentNode.insertBefore(br, currentTarget);
                    fixedCount++;
                });

                // 2. 如果格子裡面完全空了，強制補一個換行進去，讓它可以被點擊！
                if (cell.innerHTML.trim() === '') {
                    cell.innerHTML = '<br>';
                    fixedCount++;
                }
                
                // 3. 強制確保格子可以被編輯
                cell.setAttribute('contenteditable', 'true');
            });
            
            saveHistory();
            document.getElementById('float-menu').style.display = 'none'; 
            document.getElementById('edit-badge').style.display = 'none';
            alert(`🛠️ 修復完成！\n已將 ${fixedCount} 個卡住的物件移出表格，或補回遺失的輸入空間。`);
        };

    function syncKbOrderKeys() {
        let c = false; if (!kbCatOrder.hide_note) { kbCatOrder.hide_note = []; c = true; }
        const ct = {}; cache.articles.forEach(a => { if (!ct[a.big_category]) ct[a.big_category] = new Set(); ct[a.big_category].add(a.mid_category); });
        Object.keys(ct).forEach(b => { if (!kbCatOrder.big.includes(b)) { kbCatOrder.big.push(b); c = true; } });
        Object.keys(ct).forEach(b => { if (!kbCatOrder.mid[b]) kbCatOrder.mid[b] = []; [...ct[b]].forEach(m => { if (!kbCatOrder.mid[b].includes(m)) { kbCatOrder.mid[b].push(m); c = true; } }); });

    function renderKbTree() {
        const t = {}; cache.articles.forEach(a => { if (!t[a.big_category]) t[a.big_category] = {}; if (!t[a.big_category][a.mid_category]) t[a.big_category][a.mid_category] = []; t[a.big_category][a.mid_category].push(a); });
        document.getElementById('kb-tree').innerHTML = kbCatOrder.big.filter(b => t[b]).map(b => {
            const isHidden = (kbCatOrder.hide_note || []).includes(b); const noteIcon = isHidden ? '🔇' : '📢';
            const noteBtn = `<span onclick="toggleKbNote('${b}', event)" style="cursor:pointer; margin-right:8px; font-size:14px; opacity:0.8;" title="切換便利貼">${noteIcon}</span>`;
            const ms = (kbCatOrder.mid[b] || []).filter(m => t[b][m]).map(m => {
                const as = t[b][m].map(a => `<div class="article-item ${a.is_published ? '' : 'draft'}"><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveArt('${a.id}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveArt('${a.id}',1,event)">▼</button></div><span class="article-title-span" onclick="editKb('${a.id}')">📄 ${a.title}</span></div>`).join('');
                return `<details class="mid-cat" open><summary><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveMid('${b}','${m}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveMid('${b}','${m}',1,event)">▼</button></div>└ ${m}</summary>${as}</details>`;
            }).join('');
            return `<details class="big-cat" open><summary><div class="sort-actions"><button class="btn-sort-arrow" onclick="moveBig('${b}',-1,event)">▲</button><button class="btn-sort-arrow" onclick="moveBig('${b}',1,event)">▼</button></div>${noteBtn} 📂 ${b}</summary>${ms}</details>`;
        }).join('');
        document.getElementById('kb-big-list').innerHTML = kbCatOrder.big.map(v => `<option value="${v}">`).join('');
        const allMids = new Set(); Object.values(kbCatOrder.mid).forEach(a => a.forEach(m => allMids.add(m)));

    }

    async function moveBig(n,d,e){e.stopPropagation();const i=kbCatOrder.big.indexOf(n);if(i===-1||i+d<0||i+d>=kbCatOrder.big.length)return;[kbCatOrder.big[i],kbCatOrder.big[i+d]]=[kbCatOrder.big[i+d],kbCatOrder.big[i]];renderKbTree();await saveKbOrderConfig();}
    async function moveMid(b,n,d,e){e.stopPropagation();const i=kbCatOrder.mid[b].indexOf(n);if(i===-1||i+d<0||i+d>=kbCatOrder.mid[b].length)return;[kbCatOrder.mid[b][i],kbCatOrder.mid[b][i+d]]=[kbCatOrder.mid[b][i+d],kbCatOrder.mid[b][i]];renderKbTree();await saveKbOrderConfig();}
    async function moveArt(id, dir, e) {
        e.stopPropagation(); const art = cache.articles.find(a => a.id === id); if (!art) return;
        const siblings = cache.articles.filter(a => a.big_category === art.big_category && a.mid_category === art.mid_category);
        const idx = siblings.findIndex(a => a.id === id); if (idx === -1 || idx + dir < 0 || idx + dir >= siblings.length) return;
        const temp = siblings[idx]; siblings[idx] = siblings[idx + dir]; siblings[idx + dir] = temp;
        const updates = siblings.map((a, index) => { a.sort_order = index; return { id: a.id, sort_order: index, title: a.title, big_category: a.big_category, mid_category: a.mid_category }; });
        cache.articles.sort((a, b) => a.sort_order - b.sort_order); renderKbTree();
        try { await myDB.from('kb_articles').upsert(updates, { onConflict: 'id' }); } catch (err) { alert("排序儲存失敗: " + err.message); }
    }

    async function contextAction(action) {

    // 🌟 RGB 轉 HEX (供油漆刷抓取顏色使用，強化防呆版)
    function rgb2hex(rgb) {
        if (!rgb) return '';
        // 抹除所有空白，統一判定標準
        let cleanRgb = rgb.replace(/\s+/g, '');
        if (cleanRgb === 'transparent' || cleanRgb === 'rgba(0,0,0,0)' || cleanRgb === 'inherit') return '';
        if (cleanRgb.startsWith('#')) return cleanRgb;
        
        let rgbArray = cleanRgb.match(/\d+/g);
        if(!rgbArray || rgbArray.length < 3) return '';
        function hex(x) { return ("0" + parseInt(x).toString(16)).slice(-2); }
        return "#" + hex(rgbArray[0]) + hex(rgbArray[1]) + hex(rgbArray[2]);
    }

    // 🌟 格式油漆刷引擎 (升級：雙擊連續模式 + X光精準抓取)
    let formatPainterState = { active: false, continuous: false, styles: {}, clickTime: 0 };
    
    window.toggleFormatPainter = function() {
        const btnTop = document.getElementById('btn-format-painter');
        const btnFloat = document.getElementById('float-format-painter');
        const editor = document.getElementById('editor');
        
        const now = Date.now();
        const isDouble = (now - formatPainterState.clickTime < 400); 
        formatPainterState.clickTime = now;

        if (formatPainterState.active && !isDouble) {
            formatPainterState.active = false;
            formatPainterState.continuous = false;
            if(btnTop) { btnTop.classList.remove('active'); btnTop.style.background = ''; btnTop.style.borderColor = ''; }
            if(btnFloat) { btnFloat.classList.remove('active'); btnFloat.style.background = ''; btnFloat.style.borderColor = ''; btnFloat.style.color = 'var(--forest)'; }
            editor.style.cursor = 'auto';
            return;
        }

        if (!formatPainterState.active) {
            const sel = window.getSelection();
            if (!sel.rangeCount || sel.isCollapsed) return alert("⚠️ 請先「反白一段文字」，系統才知道要偷誰的格式喔！");
            
            formatPainterState.styles.bold = document.queryCommandState('bold');
            formatPainterState.styles.italic = document.queryCommandState('italic');
            formatPainterState.styles.underline = document.queryCommandState('underline');
            
            // 🔥 X光深層鑽探：解決全選段落時抓到舊格式(外層標籤)的世紀難題
            let range = sel.getRangeAt(0);
            let node = range.startContainer;
            if (node.nodeType === 1 && node.childNodes.length > range.startOffset) {
                node = node.childNodes[range.startOffset];
            }
            while (node && node.nodeType === 1 && node.childNodes.length > 0) {
                let validChild = Array.from(node.childNodes).find(n => n.textContent.replace(/\u200B/g, '').trim() !== '');
                if (validChild) node = validChild;
                else break;
            }
            if (node && node.nodeType === 3) node = node.parentNode;
            if (!node || node === editor) return;

            // 🔥 換上透視眼 X 光，絕對精準抓取真實渲染狀態

            // 🔥 換上透視眼 X 光，絕對精準抓取真實渲染狀態
            const computed = window.getComputedStyle(node);
            
            // 抓字體
            let fontStr = computed.fontFamily.toLowerCase();
            let mappedFont = "sans-serif"; 
            if (fontStr.includes('mono') || fontStr.includes('courier')) mappedFont = "monospace";
            else if (fontStr.includes('noto serif tc') || fontStr.includes('ming') || fontStr.includes('song') || (fontStr.includes('serif') && !fontStr.includes('sans-serif'))) mappedFont = "'Noto Serif TC', serif";
            
            // 抓大小並精準換算 pt
            let sizePx = parseFloat(computed.fontSize) || 16;
            let pt = sizePx * 0.75;
            const pts = [10, 12, 14, 18, 24, 36];
            let mappedSize = pts.reduce((p, c) => Math.abs(c - pt) < Math.abs(p - pt) ? c : p).toString();
            
            // 抓顏色
            let hexColor = rgb2hex(computed.color) || '#2c3e50';
            
            // 抓背景色
            let bgNode = node; let hexBg = 'transparent';
            while (bgNode && bgNode !== editor) {
                let bg = window.getComputedStyle(bgNode).backgroundColor;
                if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') {
                    hexBg = rgb2hex(bg); break;
                }
                bgNode = bgNode.parentNode;
            }
            
            formatPainterState.styles.fontName = mappedFont;
            formatPainterState.styles.fontSize = mappedSize;
            formatPainterState.styles.foreColor = hexColor;
            formatPainterState.styles.backColor = hexBg;
            
            formatPainterState.active = true;
            formatPainterState.continuous = false;
            if(btnTop) btnTop.classList.add('active');
            if(btnFloat) btnFloat.classList.add('active');
            editor.style.cursor = 'crosshair'; // 滑鼠變成十字準星
        }

        if (isDouble) {
            formatPainterState.continuous = true;
            if(btnTop) { btnTop.style.background = 'var(--warning)'; btnTop.style.borderColor = 'var(--warning)'; }
            if(btnFloat) { btnFloat.style.background = 'var(--warning)'; btnFloat.style.borderColor = 'var(--warning)'; btnFloat.style.color = '#fff'; }
            
            const toast = document.createElement('div');
            toast.innerText = "🔄 已啟用「連續格式刷」！(再點一次按鈕關閉)";
            toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--warning); color:#fff; padding:10px 20px; border-radius:50px; z-index:9999; font-size:14px; font-weight:bold; pointer-events:none; box-shadow:0 4px 15px rgba(0,0,0,0.2);";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    };

    // 放開滑鼠時：把偷來的格式「刷」上去
    document.getElementById('editor').addEventListener('mouseup', function(e) {
        if (formatPainterState.active) {
            setTimeout(() => {
                const sel = window.getSelection();
                // 只有當你真的有反白新文字時，才套用
                if (sel.rangeCount > 0 && sel.toString().trim().length > 0) {
                    const s = formatPainterState.styles;
                    
                    // 1. 在反白還活著的時候，一口氣把所有原生命令壓上去
                    if (document.queryCommandState('bold') !== s.bold) exec('bold');
                    if (document.queryCommandState('italic') !== s.italic) exec('italic');
                    if (document.queryCommandState('underline') !== s.underline) exec('underline');
                    
                    if (s.fontName) document.execCommand('fontName', false, s.fontName);
                    if (s.fontSize) document.execCommand('fontSize', false, 7); // 先借用最大級別 7，後面再精準轉碼
                    if (s.foreColor) document.execCommand('foreColor', false, s.foreColor);
                    
                    if (s.backColor && s.backColor !== 'transparent') {
                        document.execCommand('styleWithCSS', false, true);
                        document.execCommand('hiliteColor', false, s.backColor);
                        document.execCommand('backColor', false, s.backColor);
                    } else {
                        document.execCommand('styleWithCSS', false, true);
                        document.execCommand('backColor', false, 'transparent');
                    }
                    
                    // 2. 噴漆完成後 (此時反白狀態可能被破壞，但沒關係了)，一次性進行標籤除髒與轉碼
                    document.querySelectorAll('#editor font').forEach(f => {
                        const span = document.createElement('span');
                        span.style.cssText = f.style.cssText;
                        if (f.face) span.style.fontFamily = f.face;
                        if (f.color) span.style.color = f.color;
                        if (f.size === '7' && s.fontSize) {
                            span.style.fontSize = s.fontSize + 'pt'; // 轉回精準的 pt 單位
                        }
                        span.innerHTML = f.innerHTML;
                        f.replaceWith(span);
                    });

                    document.querySelectorAll('#editor span').forEach(sp => {
                        if (sp.style.fontSize === '-webkit-xxx-large' || sp.style.fontSize === 'xxx-large' || sp.style.fontSize === '48px' || sp.style.fontSize === '7em') {
                            if (s.fontSize) sp.style.fontSize = s.fontSize + 'pt';
                        }
                    });
                    
                    saveHistory();
                    
                    // 3. 刷完後，判斷是否為連續模式
                    if (!formatPainterState.continuous) {
                        toggleFormatPainter(); // 單次模式：自動關閉
                    } else {
                        // 連續模式：自動取消反白，讓你視覺更清晰，可立刻去刷下一段
                        sel.removeAllRanges();
                    }
                }
                updateToolbarState();
            }, 50);
        }
    });
    // 🌟 全域格式轉碼引擎：將外部貼上的 px、em、複雜字體，強制轉譯成編輯器專屬的 pt 與標準字型
    function normalizeTextFormats() {
        saveSelection();
        const editor = document.getElementById('editor');
        let count = 0;

        editor.querySelectorAll('span, font, p, div, td, th').forEach(el => {
            let currentSize = el.style.fontSize || el.getAttribute('size');
            let currentFont = el.style.fontFamily || el.getAttribute('face');

            if (currentSize || currentFont) {
                // 1. 轉碼大小
                if (currentSize) {
                    let ptValue = 12; // 預設 12pt
                    if (currentSize.includes('pt')) ptValue = parseFloat(currentSize);
                    else if (currentSize.includes('px')) ptValue = parseFloat(currentSize) * 0.75; // px 轉 pt
                    else if (currentSize.includes('em') || currentSize.includes('rem')) ptValue = parseFloat(currentSize) * 12;
                    else if (!isNaN(currentSize)) {
                        const sizeMap = { "1": 10, "2": 12, "3": 14, "4": 18, "5": 24, "6": 36, "7": 36 };
                        ptValue = sizeMap[currentSize] || 12;
                    }
                    // 找出最接近的選單標準大小
                    const availablePts = [10, 12, 14, 18, 24, 36];
                    const closestPt = availablePts.reduce((prev, curr) => Math.abs(curr - ptValue) < Math.abs(prev - ptValue) ? curr : prev);
                    
                    el.style.fontSize = closestPt + 'pt';
                    el.removeAttribute('size');
                }

                // 2. 轉碼字體
                if (currentFont) {
                    let lFont = currentFont.toLowerCase();
                    let newFont = 'sans-serif';
                    if (lFont.includes('serif') || lFont.includes('ming') || lFont.includes('song')) newFont = "'Noto Serif TC', serif";
                    else if (lFont.includes('mono') || lFont.includes('courier')) newFont = "monospace";
                    
                    el.style.fontFamily = newFont;
                    el.removeAttribute('face');
                }
                count++;
            }
        });
        saveHistory();
        updateToolbarState(); // 呼叫雷達更新顯示
        alert("✨ 轉碼完成！\n\n已將 " + count + " 個外部格式，成功轉換為本編輯器專屬的標準編碼。\n現在您可以從下拉選單正確讀取它們了！");
    }
    
    
    // 🌟 全篇閘門化：原子彈級重整 (先撐開 -> 刪除舊權限 -> 再縮小)
    window.batchGateTransform = function() {
        const editor = document.getElementById('editor');
        let tableCount = 0;
        let imgCount = 0;

        // 1. 處理所有表格
        editor.querySelectorAll('table').forEach(tbl => {
            // 🔥 步驟 A：先清除表格上所有亂七八糟的 style，強制重置
            tbl.removeAttribute('style');
            
            // 🔥 步驟 B：模擬「先調滿版」：強迫瀏覽器把寬度撐開
            tbl.style.setProperty('width', '100%', 'important');
            tbl.style.display = 'table';

            // 🔥 步驟 C：掃蕩格子 (把 td 裡面寫死的 100% 或 40% 通通拔掉！)
            tbl.querySelectorAll('td, th').forEach(cell => {
                cell.style.removeProperty('width'); // 絕對不准寫死寬度
                cell.style.whiteSpace = 'normal';
                cell.style.wordBreak = 'break-all';
            });

            // 🔥 步驟 D：處理圖片 (圖片一定要 100% 撐開)
            tbl.querySelectorAll('img, .resizable-wrapper').forEach(el => {
                el.style.setProperty('width', '100%', 'important');

                el.style.margin = '0 auto';
                imgCount++;
            });

            // 🔥 步驟 E：最後縮回「桌機看得到的 40%」(不加 !important，讓手機版 CSS 能覆蓋它)
            tbl.style.width = '40%';
            tbl.style.marginLeft = '0';
            tbl.style.marginRight = 'auto';
            
            tableCount++;
        });

        saveHistory();
        if (typeof triggerAutoSave === 'function') triggerAutoSave(true); 
        alert(`✨ 原子彈級重整完成！\n\n已重置 ${tableCount} 個表格。\n代碼已洗乾淨：表格寬度改為自動、圖片 100% 撐滿。`);
    };

    // 🔥 執行框線修改的邏輯
    window.updateTableStyle = function() {
        if (!currentTarget || currentTarget.tagName !== 'TABLE') return;
        
        const tbl = currentTarget;
        const target = document.getElementById('tbl-border-target').value;
        const style = document.getElementById('tbl-border-style').value;
        const width = document.getElementById('tbl-border-width').value;
        const color = document.getElementById('tbl-border-color').value;

        // 組合出 CSS 屬性，例如 "2px dashed #ff0000"
        const borderString = target === 'none' ? 'none' : `${width} ${style} ${color}`;

        // 1. 先把表格和所有格子的邊框清空，方便重新上色
        tbl.style.border = 'none';
        tbl.querySelectorAll('td, th').forEach(cell => {
            cell.style.border = 'none';
            cell.style.borderTop = 'none';
            cell.style.borderBottom = 'none';
            cell.style.borderLeft = 'none';
            cell.style.borderRight = 'none';
        });

        // 2. 根據使用者選的目標，精準套用邊框
        if (target === 'none') {
            // 已清空，不做事
        } 
        else if (target === 'all') {
            tbl.style.border = borderString;
            tbl.querySelectorAll('td, th').forEach(cell => cell.style.border = borderString);
        } 
        else if (target === 'outer') {
            tbl.style.border = borderString;
        } 
        else if (target === 'inner') {
            // 內框的邏輯：給每個格子右邊和下面加線，但最右邊和最下面的不加
            const rows = tbl.rows;
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].cells.length; c++) {
                    if (c < rows[r].cells.length - 1) rows[r].cells[c].style.borderRight = borderString;
                    if (r < rows.length - 1) rows[r].cells[c].style.borderBottom = borderString;
                }
            }
        } 
        else if (target === 'horizontal') {
            // 只有橫線：只給格子的下方加線 (最後一列不加)
            const rows = tbl.rows;
            for (let r = 0; r < rows.length - 1; r++) {
                for (let c = 0; c < rows[r].cells.length; c++) {
                    rows[r].cells[c].style.borderBottom = borderString;
                }
            }
        } 
        else if (target === 'vertical') {
            // 只有直線：只給格子的右方加線 (最後一欄不加)
            const rows = tbl.rows;
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].cells.length - 1; c++) {
                    rows[r].cells[c].style.borderRight = borderString;

    };

    // 🌟 修改自訂外框引擎
    window.updateCustomBox = function() {
        if (!currentTarget || !currentTarget.classList.contains('peiyu-custom-box')) return;
        
        // 根據使用者的選擇，隨時把框框切換成「隨字寬度」或「滿版」
        currentTarget.style.display = document.getElementById('cb-display').value;
        
        currentTarget.style.borderRadius = document.getElementById('cb-radius').value;
        currentTarget.style.borderStyle = document.getElementById('cb-style').value;
        currentTarget.style.borderWidth = document.getElementById('cb-width').value;
        currentTarget.style.color = document.getElementById('cb-color').value;
        currentTarget.style.backgroundColor = document.getElementById('cb-bg').value;
        currentTarget.style.borderColor = document.getElementById('cb-border-color').value;

        if (document.getElementById('cb-style').value === 'none') currentTarget.style.border = 'none';
        // 寫入記憶大腦
        const prefs = {
            bg: document.getElementById('cb-bg').value,
            color: document.getElementById('cb-color').value,
            borderCol: document.getElementById('cb-border-color').value,
            radius: document.getElementById('cb-radius').value,
            style: document.getElementById('cb-style').value,
            width: document.getElementById('cb-width').value,
            displayType: document.getElementById('cb-display').value
        };
        localStorage.setItem('peiyu_box_prefs', JSON.stringify(prefs));
        saveHistory();
        document.getElementById('config-modal').style.display = 'none';
    };
    
    // 🔥 補回遺失的自動存檔引擎
    let autoSaveTimer;
    window.triggerAutoSave = function(immediate = false) {
        clearTimeout(autoSaveTimer);
        const delay = immediate ? 0 : 3000; 
        autoSaveTimer = setTimeout(async () => {
            const title = document.getElementById('kb-title').value.trim();
            if (!title) return; 
            console.log("⏳ 自動儲存中...");
            await saveArticle(true); 
        }, delay); 
    };

    // 🌟 插入空白行 (暴力精準版：在哪裡按，就插在哪裡，絕對不跑到最下面)
    window.insertSpacer = function(val) {
        if (!val) return;
        
        // 準備好要插入的兩個乾淨積木：一個間距，一個新段落
        const spacerHtml = `<div class="peiyu-spacer peiyu-obj" style="height: ${val}px; line-height: 0; font-size: 0; overflow: hidden; clear: both;" contenteditable="false"></div>`;
        const nextPHtml = `<p><br></p>`;
        
        restoreSelection();
        const sel = window.getSelection();
        const editor = document.getElementById('editor');

        if (sel.rangeCount > 0) {
            let range = sel.getRangeAt(0);
            let node = range.commonAncestorContainer;

            // 如果游標還在編輯器內
            if (editor.contains(node)) {
                // 1. 尋找最近的獨立區塊元素 (包含段落、標題、清單、表格)
                let blockNode = node.nodeType === 3 ? node.parentNode : node;
                while (blockNode && blockNode !== editor && !['P', 'DIV', 'H2', 'H3', 'H4', 'LI', 'TD', 'TH'].includes(blockNode.tagName)) {
                    blockNode = blockNode.parentNode;
                }
                
                // 精準判斷：如果是普通的段落、標題或 DIV，插在它「後面」
                if (blockNode && blockNode !== editor && (blockNode.tagName === 'P' || blockNode.tagName.startsWith('H') || (blockNode.tagName === 'DIV' && !blockNode.classList.contains('peiyu-article')))) {
                    blockNode.insertAdjacentHTML('afterend', spacerHtml + nextPHtml);
                    
                    // 把游標移到新的空行裡面
                    const newP = blockNode.nextElementSibling.nextElementSibling;
                    if (newP && newP.tagName === 'P') {
                        const newRange = document.createRange();
                        newRange.selectNodeContents(newP);
                        newRange.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(newRange);
                    }
                } 
                // 如果找不到合適的段落 (例如游標卡在很奇怪的地方)，就直接暴力用 range 插入
                else {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = spacerHtml + nextPHtml;
                    let frag = document.createDocumentFragment();
                    let lastNode;
                    while (tempDiv.firstChild) {
                        lastNode = frag.appendChild(tempDiv.firstChild);
                    }
                    range.insertNode(frag);
                    
                    if (lastNode) {
                        range.setStartAfter(lastNode);
                        range.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            } else {
                // 如果游標不在編輯器裡，才墊底插入
                editor.querySelector('.peiyu-article').insertAdjacentHTML('beforeend', spacerHtml + nextPHtml);
            }
        } else {
            // 如果什麼都沒選到，也墊底插入
            let targetContainer = editor.querySelector('.peiyu-article') || editor;
            targetContainer.insertAdjacentHTML('beforeend', spacerHtml + nextPHtml);
        }
        
        saveHistory();
        document.getElementById('spacer-menu').style.display = 'none'; 
    };

    // --- 啟動程序 ---
    document.addEventListener("DOMContentLoaded", () => {
        requireLogin();
        const curtain = document.getElementById('security-curtain');
        if (curtain) curtain.remove();

        
        initMobileEditorTools();
        fetchKbData();
    });

</script>

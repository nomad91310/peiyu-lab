<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服務項目管理</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style id="security-curtain">
        body { visibility: hidden !important; opacity: 0 !important; }
    </style>
    <style>
        :root { --forest: #1a2f23; --accent: #c6a87c; --danger: #e74c3c; --info: #3498db; --success: #27ae60; --warning: #f39c12; --purple: #9b59b6; --cream: #fdfbf7; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: transparent; margin: 0; padding: 20px; color: #333; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid var(--accent); overflow-x: auto; }
        
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; margin-bottom: 5px; font-family: inherit; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; transition:0.2s; display: inline-flex; align-items: center; justify-content: center; margin: 0; white-space: nowrap; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-forest { background: var(--forest); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-outline { background: white; border: 1px solid #ccc; color: #666; }
        
        .tpl-btn { background: #fffcf5; border: 1px solid var(--accent); color: var(--forest); font-size: 12px; padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; margin-right: 5px; margin-bottom: 5px; display: inline-block; font-weight: bold; }
        .tpl-btn:hover { background: var(--accent); color: #fff; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; color: #444; }
        tr:hover { background: #fdfaf1; }
        .admin-row { display: flex; gap: 10px; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; transition: 0.2s; flex-wrap: wrap; }
        .admin-row:hover { background: #f0f7ff; }
        .sql-hint-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; color: #856404; position: relative; }
        .btn-copy-sql { position: absolute; right: 10px; top: 10px; font-size: 11px; padding: 2px 6px; }

        /* 🔥 前台預覽視窗相關 CSS */
        .preview-wrapper { width: 100%; margin: 0 auto; transition: 0.3s; background: var(--cream); border-radius: 12px; overflow: hidden; }
        .preview-desktop { max-width: 900px; }
        .preview-mobile { max-width: 375px; border: 12px solid #333; border-radius: 35px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .product-showcase { display: flex; gap: 30px; align-items: flex-start; background: #fffcf5; padding: 35px 30px; border-radius: 24px; box-shadow: 0 12px 35px rgba(198, 168, 124, 0.15); border: 2px solid rgba(198, 168, 124, 0.25); }
        /* 🔥 左側相片與說明區的外部容器 */
        .gallery-wrapper { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        
        /* 圖片白底相框 (維持完美 1:1 正方形) */
        .product-gallery { flex: 1; width: 100%; border-radius: 16px; overflow: hidden; position: relative; background: #ffffff; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); aspect-ratio: 1 / 1; }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); align-items: center; }
        .carousel-slide { min-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
        
        /* 獨立的文字說明 (無底色，搭配小箭頭) */
        .dynamic-caption { margin-top: 12px; text-align: center; color: #777; font-size: 13.5px; font-weight: bold; letter-spacing: 0.5px; }
        .product-text-content { flex: 1.2; display: flex; flex-direction: column; }
        .product-desc { font-size: 0.95rem; color: #555; line-height: 1.8; text-align: justify; }
        
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: var(--forest); z-index: 10; }
        .carousel-btn:hover { background: var(--forest); color: #fff; }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        .carousel-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px; z-index: 10; }
        .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; transition: 0.3s; }
        .carousel-dot.active { background: #fff; transform: scale(1.2); }

        /* 預覽模式：手機版強制覆蓋 */
        .preview-mobile .product-showcase { flex-direction: column !important; padding: 25px 15px !important; gap: 20px; }
        .preview-mobile .gallery-wrapper, .preview-mobile .product-text-content { width: 100%; flex: none; }

        @media (max-width: 1024px) { 
            body { padding: 10px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="card" id="view-list">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
        <h3 style="margin:0; color:var(--forest);">📂 服務項目管理</h3>
        <button class="btn btn-forest" onclick="showEdit()">＋ 新增服務項目</button>
    </div>
    
    <div class="sql-hint-box" style="background: #e8f5e9; border-color: #c8e6c9; color: #155724;">
        <strong>💡 系統提示：</strong> 點擊「✏️ 編輯」可進入設定服務說明、輪播圖與加購細項。
    </div>
    <table id="cat-list"></table>
</div>

<div class="card" id="view-edit" style="display:none;">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px; padding-bottom:15px; border-bottom:2px solid #eee;">
        <button class="btn btn-outline" onclick="showList()" style="padding:6px 12px;">← 返回列表</button>
        <h3 style="margin:0; color:var(--forest);" id="edit-view-title">⚙️ 編輯服務設定</h3>
    </div>

    <input type="hidden" id="cat-id-edit">
    <label style="font-weight:bold; font-size:13px; color:var(--forest);">主服務名稱</label>
    <input type="text" id="cat-name" placeholder="例: 人類圖解讀" style="margin-bottom:15px; font-weight: bold; border-color: var(--forest); font-size:16px;">
    
    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
        <div style="flex:1; min-width:200px;">
            <label style="font-weight:bold; font-size:13px; color:var(--forest);">表單問題類型</label>
            <select id="cat-type" style="height: 42px;">
                <option value="sleep">詢問睡眠 (調頻類)</option>
                <option value="consult">詢問日期 (諮詢類)</option>
            </select>
        </div>
        <div style="flex:1; min-width:250px; background:#e3f2fd; padding:12px; border-radius:6px; border:1px solid #bbdefb;">
            <label style="font-size:12px; color:#1565c0; font-weight:bold; display:block; margin-bottom:8px;">客人可提供資料方式 (可複選)：</label>
            <div style="display:flex; gap:15px; flex-wrap: wrap;">
                <label style="cursor:pointer; display:flex; align-items:center; gap:5px; color:#333;"><input type="checkbox" id="req-birth" value="birth" style="width:18px; height:18px;" checked> 📅 出生年月日</label>
                <label style="cursor:pointer; display:flex; align-items:center; gap:5px; color:#333;"><input type="checkbox" id="req-image" value="image" style="width:18px; height:18px;"> 📸 上傳截圖</label>
            </div>
        </div>
    </div>

    <div style="background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">
            <label style="font-weight:bold; font-size:14px; color:var(--forest); margin:0;">📸 服務輪播圖與說明</label>
            <button class="btn btn-outline" style="font-size:12px; padding:6px 12px;" onclick="document.getElementById('cat-img-upload-main').click()"><i class="fa-solid fa-cloud-arrow-up"></i> 新增圖片</button>
            <input type="file" id="cat-img-upload-main" accept="image/*" multiple style="display:none;" onchange="handleMainUpload(this)">
        </div>
        <div id="cat-img-preview-main" style="display:flex; gap:15px; flex-wrap:wrap;">
            <p style="color:#999; font-size:13px; margin:0;">尚未上傳圖片。上傳後可於下方新增小字說明。</p>
        </div>
    </div>

    <div style="background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 15px;">
        <label style="font-weight:bold; font-size:13px; color:var(--forest); display:block; margin-bottom:10px;">📖 服務圖文說明</label>
        <input type="text" id="cat-desc-title" placeholder="自訂說明標題 (未填則預設為「服務簡介」)" style="margin-bottom:15px;">
        <input type="hidden" id="cat-desc">
        
        <div style="display:flex; align-items:center; gap:10px; background:#f9f9f9; padding:12px 15px; border-radius:8px; border:1px solid #eaeaea;">
            <span id="cat-desc-status" style="font-size:13px; font-weight:bold; color:#999;"><i class="fa-solid fa-circle-xmark"></i> 尚未編輯</span>
            <div style="margin-left:auto; display:flex; gap:8px;">
                <button type="button" class="btn btn-outline" id="cat-desc-edit-btn" onclick="openEditor('cat-desc', '編輯服務詳細說明')"><i class="fa-solid fa-pen"></i> 開始編輯</button>
                <button type="button" class="btn btn-info" id="cat-desc-view-btn" onclick="openStandalonePreview('cat-desc')" style="display:none;"><i class="fa-solid fa-eye"></i> 前台預覽</button>
            </div>
        </div>
    </div>

    <div style="background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 15px;">
        <label style="font-weight:bold; font-size:13px; color:var(--danger); display:block; margin-bottom:10px;">📜 規範與同意事項</label>
        <input type="hidden" id="cat-terms">
        
        <div style="display:flex; align-items:center; gap:10px; background:#f9f9f9; padding:12px 15px; border-radius:8px; border:1px solid #eaeaea;">
            <span id="cat-terms-status" style="font-size:13px; font-weight:bold; color:#999;"><i class="fa-solid fa-circle-xmark"></i> 尚未編輯</span>
            <div style="margin-left:auto; display:flex; gap:8px;">
                <button type="button" class="btn btn-outline" id="cat-terms-edit-btn" onclick="openEditor('cat-terms', '編輯規範與同意事項')"><i class="fa-solid fa-pen"></i> 開始編輯</button>
                <button type="button" class="btn btn-info" id="cat-terms-view-btn" onclick="openStandalonePreview('cat-terms')" style="display:none;"><i class="fa-solid fa-eye"></i> 前台預覽</button>
            </div>
        </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:15px; margin-top:15px;">
        <button class="btn btn-forest" id="btn-cat-save" onclick="saveCategory()" style="padding:10px 20px; font-size:14px;">💾 儲存主服務設定</button>
        <span id="save-hint" style="font-size:13px; color:#c6a87c; font-weight:bold;">(💡 請先儲存主服務，才能在下方新增細項)</span>
    </div>

    <div id="sub-items-manager" style="margin-top: 40px; padding-top: 30px; border-top: 2px dashed #ccc; display:none;">
        <h3 style="margin-top:0; color:var(--forest); margin-bottom: 15px;">➕ 服務細項與加購管理</h3>
        
        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #eee;">
            <input type="hidden" id="svc-id-edit">
            <div style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom:10px;">
                <div style="flex:2; min-width: 150px;">
                    <label style="font-size:12px; font-weight:bold; color:#666;">項目名稱</label>
                    <input type="text" id="i-name" placeholder="例: 完整解析、加購流年">
                </div>
                <div style="flex:1; min-width: 100px;">
                    <label style="font-size:12px; font-weight:bold; color:#666;">價格</label>
                    <input type="number" id="i-price" placeholder="價格">
                </div>
            </div>
            
            <label style="display:flex; align-items:center; gap:5px; margin-bottom:10px; color:var(--danger); font-weight:bold; cursor:pointer;">
                <input type="checkbox" id="i-is-main" style="width:18px; height:18px;" onchange="toggleSubOptionInput()"> 設為主項目 (前台必選，無子選項)
            </label>
            
            <div id="main-opt-wrapper" style="display:none;">
                <input type="text" id="i-report-tpl" placeholder="對應報告檔案 (例: srt_report.html)">
                <small style="color:var(--purple); display:block; line-height:1.4;">💡 若為主項目，請填寫此欄以連結報表。</small>
            </div>
            <div id="sub-opt-wrapper">
                <input type="text" id="i-sub-opts" placeholder="子選項 (逗號隔開)">
                <small style="color:#666; display:block; line-height:1.4;">💡 加購項目才需要填寫子選項，例如：事業, 感情, 財運</small>
            </div>
            
            <div style="display:flex; gap:8px; justify-content: flex-end; margin-top:15px;">
                <button class="btn btn-outline" id="btn-svc-cancel" onclick="cancelItemEdit()" style="display:none;">取消</button>
                <button class="btn btn-forest" id="btn-svc-save" onclick="saveItem()">＋ 儲存細項</button>
            </div>
        </div>
        
        <div style="max-height:450px; overflow-y:auto; border:1px solid #eee; border-radius:8px;" id="svc-list-container">
            <p style="padding:15px; color:#999; text-align:center;">載入中...</p>
        </div>
    </div>
</div>

<div id="standalone-preview-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:20000; justify-content:center; align-items:center; padding:10px; overflow:hidden;">
    <div style="background:#2c3e50; width:100%; max-width:900px; height:95vh; border-radius:16px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 25px 50px rgba(0,0,0,0.5);">
        
        <div style="color:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #34495e;">
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="standalone-preview-title" style="font-weight:bold; font-size:1rem; margin-right:15px;">預覽</span>
                <button class="btn btn-outline" style="padding:4px 10px; background:#fff; color:#333; font-size:12px;" onclick="setPreviewMode('desktop')">💻 電腦版</button>
                <button class="btn btn-outline" style="padding:4px 10px; background:#ccc; color:#333; font-size:12px; border:none;" onclick="setPreviewMode('mobile')">📱 手機版</button>
            </div>
            <button onclick="closePreviewModal()" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; line-height:1;">&times;</button>
        </div>
        
        <div style="flex:1; overflow-y:auto; background:#e9ecef; display:flex; flex-direction:column; align-items:center; padding:20px 10px;">
            <div id="standalone-preview-content" class="preview-wrapper preview-desktop">
                </div>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/shared_editor.js"></script>

<script>
    let cache = { cats: [], svcs: [] };
    let currentCatImages = []; 
    let currentEditorTarget = '';
    let previewCurrentSlide = 0; 

    // --- SPA 視圖切換邏輯 ---
    function showList() {
        document.getElementById('view-edit').style.display = 'none';
        document.getElementById('view-list').style.display = 'block';
        
        document.getElementById('cat-id-edit').value = '';
        document.getElementById('cat-name').value = '';
        document.getElementById('cat-terms').value = '';
        document.getElementById('cat-desc').value = '';
        document.getElementById('cat-desc-title').value = '';
        document.getElementById('cat-type').value = 'sleep';
        document.getElementById('req-birth').checked = true;
        document.getElementById('req-image').checked = false;
        
        updatePreview('cat-desc'); updatePreview('cat-terms');
        currentCatImages = []; renderMainImgPreview();
        
        document.getElementById('btn-cat-save').innerText = "💾 儲存主服務設定";
        document.getElementById('btn-cat-save').className = "btn btn-forest";
        cancelItemEdit();
    }

    function showEdit(catId = null) {
        document.getElementById('view-list').style.display = 'none';
        document.getElementById('view-edit').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        if (catId) {
            document.getElementById('edit-view-title').innerText = "⚙️ 編輯服務與細項";
            editCat(catId);
            document.getElementById('sub-items-manager').style.display = 'block';
            document.getElementById('save-hint').style.display = 'none';
        } else {
            document.getElementById('edit-view-title').innerText = "✨ 新增服務項目";
            document.getElementById('sub-items-manager').style.display = 'none';
            document.getElementById('save-hint').style.display = 'inline';
        }
    }

    // --- UI 按鈕狀態更新引擎 ---
    function updatePreview(id) {
        const val = document.getElementById(id).value;
        const statusSpan = document.getElementById(id + '-status');
        const editBtn = document.getElementById(id + '-edit-btn');
        const viewBtn = document.getElementById(id + '-view-btn');

        if (!val || val === '<p><br></p>' || val.trim() === '') {
            statusSpan.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> 尚未編輯`;
            statusSpan.style.color = '#999';
            editBtn.className = 'btn btn-outline';
            editBtn.innerHTML = `<i class="fa-solid fa-pen"></i> 開始編輯`;
            viewBtn.style.display = 'none';
        } else {
            statusSpan.innerHTML = `<i class="fa-solid fa-circle-check"></i> 已有內容`;
            statusSpan.style.color = 'var(--success)';
            editBtn.className = 'btn btn-success';
            editBtn.innerHTML = `<i class="fa-solid fa-pen"></i> 繼續編輯`;
            viewBtn.style.display = 'inline-flex';
        }
    }

    // --- HTML 格式化引擎 ---
    function formatHTML(str) {
        if (!str) return "";
        if (str.includes('<div') || str.includes('<span') || str.includes('<ul') || str.includes('<li') || str.includes('<b') || str.includes('<p')) {
            return str; 
        }
        return str.replace(/\n/g, '<br>'); 
    }

    // --- 🔥 獨立跳窗：100% 前台擬真預覽 ---
    function openStandalonePreview(id) {
        const val = document.getElementById(id).value;
        const modal = document.getElementById('standalone-preview-modal');
        const contentBox = document.getElementById('standalone-preview-content');
        const titleSpan = document.getElementById('standalone-preview-title');

        if (id === 'cat-terms') {
            titleSpan.innerHTML = '<i class="fa-solid fa-scroll"></i> 規範與條款預覽';
            contentBox.innerHTML = `
                <div style="background:var(--cream); padding:30px; min-height:100%;">
                    <div style="background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #eee; font-size: 13.5px; line-height: 1.8; color: #555; max-height: none; overflow-y: visible;">
                        ${formatHTML(val)}
                    </div>
                </div>`;
        } else {
            titleSpan.innerHTML = '<i class="fa-solid fa-image"></i> 服務說明與圖片預覽';
            
            let galleryHtml = '';
            // 存入全域變數供預覽輪播使用
            window.previewCaptions = currentCatImages.map(img => img.caption || '');
            
            if (currentCatImages.length > 0) {
                // 這裡只放圖片
                const slides = currentCatImages.map(img => `<div class="carousel-slide"><img src="${img.url}"></div>`).join('');
                const dots = currentCatImages.map((_, i) => `<div class="carousel-dot preview-carousel-dot ${i===0?'active':''}" onclick="goPreviewSlide(${i})"></div>`).join('');
                
                let navBtns = '';
                if(currentCatImages.length > 1) {
                    navBtns = `
                        <button class="carousel-btn prev" onclick="movePreviewSlide(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                        <button class="carousel-btn next" onclick="movePreviewSlide(1)"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="carousel-dots">${dots}</div>
                    `;
                }
                
                // 🔥 獨立的小字說明區塊 + 金色向上箭頭
                const initialCaption = window.previewCaptions[0];
                const captionHtml = `<div id="preview-dynamic-caption" class="dynamic-caption" style="display: ${initialCaption ? 'block' : 'none'};"><i class="fa-solid fa-caret-up" style="color:var(--accent); margin-right:6px;"></i><span id="preview-dynamic-caption-text">${initialCaption}</span></div>`;
                
                galleryHtml = `
                    <div class="gallery-wrapper">
                        <div class="product-gallery">
                            <div class="carousel-track" id="preview-carousel-track">${slides}</div>
                            ${navBtns}
                        </div>
                        ${captionHtml}
                    </div>
                `;
            }

    // 🔥 強化版：刪除圖片的同時也清理儲存空間
    async function removeCatImg(index) {
        const imgObj = currentCatImages[index];
        if (!imgObj) return;

        // 從完整的 Public URL 提取檔案名稱
        // 網址通常長這樣：.../storage/v1/object/public/site-assets/svc_123.jpg
        const urlParts = imgObj.url.split('/');
        const fileName = urlParts[urlParts.length - 1];

        if (confirm("⚠️ 確定要刪除這張圖片嗎？這將會永久刪除儲存空間中的檔案！")) {
            try {
                // 1. 從 Supabase Storage 刪除實體檔案
                const { error } = await myDB.storage.from('site-assets').remove([fileName]);
                if (error) throw error;

                // 2. 從本地陣列移除並更新 UI
                currentCatImages.splice(index, 1);
                renderMainImgPreview();
                alert("✅ 檔案已從雲端正式刪除");
            } catch (e) {
                console.error("刪除失敗:", e);
                alert("刪除失敗: " + e.message);
            }
        }
    }
    function compressImageFile(file, maxSize) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > maxSize || h > maxSize) { if(w > h) { h *= maxSize/w; w = maxSize; } else { w *= maxSize/h; h = maxSize; } }
                    cvs.width = w; cvs.height = h;
                    const ctx = cvs.getContext('2d'); ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,w,h);
                    ctx.drawImage(img, 0, 0, w, h);
                    cvs.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85);
                };
            };
        });
    }

    // 🔥 強化版：刪除主服務時，同步清空所有關聯圖片
    async function deleteCat(id) {
        const c = cache.cats.find(x => x.id === id);
        if (!c) return;

        if (!confirm(`⚠️ 警告：確定要刪除「${c.name}」嗎？\n這將會同步刪除該服務下的所有圖片檔案，且無法復原！`)) return;

        try {
            // 1. 抓出所有圖片檔名
            let filesToDelete = [];
            if (c.image_urls) {
                try {
                    const imgs = JSON.parse(c.image_urls);
                    filesToDelete = imgs.map(img => {
                        const url = typeof img === 'string' ? img : img.url;
                        const parts = url.split('/');
                        return parts[parts.length - 1];
                    });
                } catch (e) { console.warn("解析圖片路徑失敗", e); }
            }

            // 2. 如果有圖片，先從 Storage 批次刪除
            if (filesToDelete.length > 0) {
                await myDB.storage.from('site-assets').remove(filesToDelete);
            }

            // 3. 最後才刪除資料庫中的服務紀錄
            const { error } = await myDB.from('service_categories').delete().eq('id', id);
            
            if (error) throw error;
            alert("✅ 服務項目與圖片已全部清理完畢");
            fetchMenuData();
        } catch (e) {
            alert("刪除失敗 (可能有關聯資料): " + e.message);
        }
    }    
    function copyNewSqlCode() { navigator.clipboard.writeText("ALTER TABLE service_categories ADD COLUMN description TEXT, ADD COLUMN image_urls TEXT, ADD COLUMN desc_title TEXT;").then(()=>alert("已複製")); }

    document.addEventListener("DOMContentLoaded", () => { 
        if (typeof requireLogin === 'function') requireLogin(); 
        const curtain = document.getElementById('security-curtain'); 
        if (curtain) curtain.remove(); 
        
        showList(); 
        fetchMenuData(); 

        document.getElementById('cat-desc').addEventListener('change', () => updatePreview('cat-desc'));
        document.getElementById('cat-terms').addEventListener('change', () => updatePreview('cat-terms'));
    });
</script>
</body>
</html>

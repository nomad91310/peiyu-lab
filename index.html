<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>培癒試驗室</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" href="/assets/images/peiyu-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/peiyu-logo.png">

    <meta name="thumbnail" content="https://peiyu-lab.vercel.app/assets/images/peiyu-logo.png">

    <meta property="og:title" content="培癒試驗室">
    <meta property="og:image" content="https://peiyu-lab.vercel.app/assets/images/peiyu-logo.png">
    <meta property="og:image:width" content="960">
    <meta property="og:image:height" content="960">
    <meta property="og:url" content="https://peiyu-lab.vercel.app/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://peiyu-lab.vercel.app/assets/images/peiyu-logo.png">
    
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "培癒試驗室",
        "url": "https://peiyu-lab.vercel.app/", 
        "logo": {
            "@type": "ImageObject",
            "url": "https://peiyu-lab.vercel.app/assets/images/peiyu-logo.png",
            "width": 960,
            "height": 960
        }
    }
    </script>
<style>
    :root { --forest: #1a2f23; --accent: #c6a87c; --white: #ffffff; --cream: #f9f7f2; }
    * { box-sizing: border-box; }
    html { height: -webkit-fill-available; }
    
    body { 
        margin: 0; 
        font-family: -apple-system, "Microsoft JhengHei", sans-serif; 
        background-color: var(--cream); 
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
        
        /* 🔥 終極高度鎖定術：優先使用 dvh，如果舊手機不支援就用備用方案 */
        height: 100vh; 
        height: 100dvh; 
        min-height: -webkit-fill-available; 
    }
    nav { background: var(--forest); padding: 0 40px; display: flex; justify-content: space-between; align-items: center; height: 80px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); border-bottom: 3px solid var(--accent); flex-shrink: 0; z-index: 1000;}
    .logo-area { display: flex; align-items: center; cursor: pointer; height: 100%; }
    .logo-img { max-height: 60px; width: auto; transition: transform 0.3s; } 
    .nav-links { display: flex; gap: 20px; }
    .nav-links button { background: none; border: none; padding: 8px 0; cursor: pointer; font-size: 16px; color: rgba(255,255,255,0.7); transition: 0.3s; font-family: 'Noto Serif TC', serif; letter-spacing: 1px; position: relative; }
    .nav-links button::after { content: ''; position: absolute; width: 0; height: 2px; bottom: 0; left: 0; background-color: var(--accent); transition: width 0.3s; }
    .nav-links button:hover { color: var(--accent); }
    .nav-links button:hover::after { width: 100%; }
    .nav-links button.active { color: var(--white); font-weight: bold; }
    .nav-links button.active::after { width: 100%; background-color: var(--white); }
    .hamburger-btn { display: none; background: none; border: none; color: var(--white); font-size: 28px; cursor: pointer; padding: 5px; }

    .footer-banner { background-color: var(--forest); border-top: 3px solid var(--accent); padding: 10px 0; flex-shrink: 0; z-index: 1000;}
    .footer-content { max-width: 1200px; margin: 0 auto; padding: 0 15px; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .social-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 0.85rem; color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }
    .social-btn:hover { background: var(--accent); color: var(--forest); border-color: var(--accent); }
    .copyright { font-size: 0.75rem; color: rgba(255,255,255,0.4); white-space: nowrap; }

    .tv-container { flex: 1; width: 100%; position: relative; overflow: hidden; background: var(--cream); }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    @media (max-width: 768px) {
        /* 🔥 1. 縮減上方 Banner 的高度，把空間還給內容 */
        nav { padding: 0 20px; height: 60px; } 
        
        /* 🔥 2. 同步把 Logo 縮小，才不會超出框框 */
        .logo-img { max-height: 42px; } 
        
        .hamburger-btn { display: block !important; font-size: 24px; padding: 2px 5px; }
        
        /* 🔥 3. 下拉選單的頂部位置也要跟著上移到 60px */
        .nav-links { display: none; position: absolute; top: 60px; left: 0; width: 100%; background: var(--forest); flex-direction: column; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-links.active { display: flex; }
        .nav-links button { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* 手機版隱藏下方 Banner 的魔法斗篷 */
        .footer-banner.hide-on-mobile { display: none !important; }
    }
</style>
</head>
<body>

<nav>
    <div class="logo-area" onclick="switchChannel('peiyu_index/home.html', 'nav-home')">
        <img src="assets/images/logo.png" alt="培癒試驗室" class="logo-img" id="site-logo">
    </div>
    <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
    <div class="nav-links" id="nav-menu">
        <button onclick="switchChannel('peiyu_index/home.html', 'nav-home')" id="nav-home" class="active">首頁</button>
        <button onclick="switchChannel('peiyu_index/booking.html', 'nav-booking')" id="nav-booking">服務預約</button>
        <button onclick="switchChannel('peiyu_index/kb.html', 'nav-knowledge')" id="nav-knowledge">培癒寶典</button>
        <button onclick="switchChannel('peiyu_index/draw.html', 'nav-draw')" id="nav-draw">能量抽卡</button>
        <button onclick="switchChannel('peiyu_index/member.html', 'nav-member')" id="nav-member">會員專區</button>
    </div>
</nav>

<div class="tv-container">
    <iframe name="front_frame" id="front_frame" src="peiyu_index/home.html"></iframe>
</div>

<div class="footer-banner">
    <div class="footer-content">
        <div class="social-group">
            <a href="https://line.me/R/ti/p/@927ctmwa" target="_blank" class="social-btn"><i class="fa-brands fa-line"></i> LINE</a>
            <a href="https://instagram.com/nomad91310" target="_blank" class="social-btn"><i class="fa-brands fa-instagram"></i> IG</a>
            <a href="https://www.threads.net/@nomad91310" target="_blank" class="social-btn"><i class="fa-brands fa-threads"></i> Threads</a>
        </div>
        <div class="copyright">&copy; 2026 培癒試驗室</div>
    </div>
</div>
<script>

    // 🔥 1. 網頁剛載入時的「自動接客」與「網址校正」
    document.addEventListener("DOMContentLoaded", () => { 
        loadSiteAssets(); 
        
        const params = new URLSearchParams(window.location.search);
        const targetView = params.get('view');
        const queryString = window.location.search; 

        // 參數中的 false 代表「這是首次載入，不用再疊加一次網址紀錄」
        if (targetView === 'draw') {
            switchChannel('peiyu_index/draw.html', 'nav-draw', false);
        } else if (targetView === 'booking' || targetView === 'booking-step-1') {
            switchChannel('peiyu_index/booking.html', 'nav-booking', false);
        } else if (targetView === 'knowledge') {
            switchChannel('peiyu_index/kb.html' + queryString, 'nav-knowledge', false);
        } else if (targetView === 'member') {
            switchChannel('peiyu_index/member.html', 'nav-member', false);
        }
    });

    async function loadSiteAssets() { 
        const { data } = await myDB.from('site_content').select('*').eq('category', 'site_asset'); 
        if (data) { 
            data.forEach(item => { 
                if (item.title === 'logo') { const el = document.getElementById('site-logo'); if(el) el.src = item.image_url; }
            }); 
        } 
    }

    // 🔥 2. 統一切換頻道功能 (負責更新電視畫面 + 更新外層網址)
    // 🔥 2. 統一切換頻道功能 (負責更新電視畫面 + 更新外層網址 + 控制下方Banner)
    window.switchChannel = function(url, btnId, pushState = true) {
        document.getElementById('front_frame').src = url;
        
        // 處理導航列高亮
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        if(btnId) document.getElementById(btnId).classList.add('active');
        document.getElementById('nav-menu').classList.remove('active'); 

        // 🔥 新增：判斷是否要隱藏下方 Banner (手機版限定)
        const footer = document.querySelector('.footer-banner');
        if (footer) {
            if (btnId === 'nav-home' || !btnId) {
                // 如果是首頁，脫下隱形斗篷 (顯示)
                footer.classList.remove('hide-on-mobile');
            } else {
                // 如果是其他頁面，穿上隱形斗篷 (隱藏)
                footer.classList.add('hide-on-mobile');
            }
        }

        // 改變外層瀏覽器網址
        if (pushState) {
            let newUrl = window.location.pathname; 
            
            if (btnId === 'nav-booking') newUrl += '?view=booking';
            else if (btnId === 'nav-knowledge') newUrl += '?view=knowledge';
            else if (btnId === 'nav-draw') newUrl += '?view=draw';
            else if (btnId === 'nav-member') newUrl += '?view=member';

            window.history.pushState({ path: newUrl }, '', newUrl);
        }
    }
    // 🔥 提供給 iframe 內部的子網頁呼叫的原生分享功能
    window.triggerNativeShare = async function(shareData) {
        if (navigator.share) {
            try {
                await navigator.share(shareData);
            } catch (err) {
                // 玩家按下取消分享，不需要跳出錯誤
                console.log("分享已取消", err);
            }
        } else {
            // 如果連外層瀏覽器都不支援 share，就 fallback 複製網址
            alert("⚠️ 您的瀏覽器不支援快速分享，請直接複製上方網址列唷！");
        }
    };

    function toggleMenu() { document.getElementById('nav-menu').classList.toggle('active'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
<style>
    /* ======================================================
       1. 全站基礎設定與 KB 專屬 CSS
       ====================================================== */
    :root { --forest: #1a2f23; --accent: #c6a87c; --cream: #f9f7f2; --white: #ffffff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: transparent; color: #2c3e50; line-height: 1.7; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Noto Serif TC', serif; }
    
    .section { padding: 20px 20px 80px 20px; max-width: 1100px; margin: 0 auto; animation: fadeSlideUp 0.5s ease-out; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .btn-pill-search, .kb-action-btn, .kb-internal-back {
        height: 40px; padding: 0 22px; font-size: 14px; font-weight: bold; border-radius: 50px;
        display: inline-flex; align-items: center; justify-content: center; text-decoration: none; cursor: pointer; transition: all 0.3s;
        background-color: var(--forest); border: 1px solid var(--accent); color: var(--accent); box-shadow: 0 4px 10px rgba(26, 47, 35, 0.2);
    }
    .btn-pill-search i, .kb-action-btn i, .kb-internal-back i { color: var(--accent); margin-right: 6px; transition: all 0.3s; }
    .btn-pill-search:hover, .kb-action-btn:hover, .kb-internal-back:hover { background-color: var(--accent); border-color: var(--accent); color: #ffffff; transform: translateY(-2px); }
    .btn-pill-search:hover i, .kb-action-btn:hover i, .kb-internal-back:hover i { color: #ffffff; }
    
    #kb-share-btn { width: 40px; min-width: 40px; height: 40px; padding: 0; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: var(--forest); border: 1px solid var(--accent); cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(26, 47, 35, 0.2); }
    #kb-share-btn i { color: var(--accent); font-size: 14px; }
    #kb-share-btn:hover { background-color: var(--accent); transform: translateY(-2px); }
    #kb-share-btn:hover i { color: #ffffff; }

    /* 懸浮返回與置頂 */
    .kb-fab-back {
        display: none; position: fixed; 
        bottom: 30px; right: 30px; 
        width: 50px; height: 50px; 
        z-index: 9999; font-size: 1.2rem;
        background: var(--forest) !important; color: var(--accent) !important; border: 2px solid var(--accent) !important; border-radius: 50%; justify-content: center; align-items: center;
        box-shadow: 0 5px 20px rgba(0,0,0,0.4); cursor: pointer; opacity: 0; transition: all 0.3s; transform: translateY(20px);
    }
    .kb-fab-back.show { opacity: 1; transform: translateY(0); display: flex !important; }
    .kb-fab-back:hover { background: var(--accent) !important; color: #ffffff !important; transform: translateY(-5px); }
    
    #back-to-top {
        display: flex; justify-content: center; align-items: center; position: fixed; 
        bottom: 95px; right: 30px; 
        width: 50px; height: 50px; 
        z-index: 9999; border-radius: 50%; background-color: var(--forest); border: 2px solid var(--accent); color: var(--accent); font-size: 1.2rem;
        cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transform: translateY(20px); transition: all 0.3s ease;
    }
    #back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
    #back-to-top:hover { background-color: var(--accent); color: #ffffff; transform: translateY(-5px); }

    .brand-section-header { text-align: center; padding-top: 15px; }
    .brand-h3-zh { display: inline-block; font-family: 'Noto Serif TC', serif; font-size: 2.2rem; color: var(--forest); margin: 0; font-weight: 900; letter-spacing: 5px; }
    .brand-h2-en { display: inline-block; font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--forest); margin-left: 15px; font-weight: 700; letter-spacing: 1.5px; opacity: 0.4; }
    .brand-capsule { display: table; margin: 10px auto 0 auto; font-family: 'Noto Serif TC', serif; font-size: 0.85rem; color: #777; background: #fffdf9; padding: 4px 22px; border-radius: 50px; border: 1px solid rgba(198, 168, 124, 0.4); }
    .brand-capsule::before, .brand-capsule::after { content: '✦'; color: var(--accent); margin: 0 10px; font-size: 0.8rem; }

    .kb-cat-view { background: #fdfaf5 !important; padding: 20px 20px 25px 20px !important; border-radius: 24px; box-shadow: inset 0 0 20px rgba(26, 47, 35, 0.02); margin-top: 0 !important; position: relative !important;}
    .kb-inner-header-row { display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important; margin-bottom: 5px !important; gap: 10px; }
    .kb-action-group { display: flex; gap: 10px; align-items: center; }
    
    .kb-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 5px 0; }
    .kb-article-card { 
        background: #ffffff !important; padding: 12px 20px !important; border-radius: 12px !important; 
        border: 1px solid #f0f0f0; border-left: 6px solid var(--accent) !important; min-height: 65px; 
        display: flex; align-items: center; transition: 0.3s; cursor: pointer; margin-bottom: 0;
    }
    .kb-article-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(26, 47, 35, 0.1); border-left-color: var(--forest) !important; }
    .kb-card-content { display: flex !important; align-items: center !important; width: 100% !important; min-width: 0 !important; }
    
    .kb-card-num {
        flex: 0 0 40px !important; width: 65px !important; display: inline-flex !important;
        justify-content: flex-start !important; text-align: left !important; white-space: nowrap !important;
        font-family: 'Cinzel', serif !important; font-size: 1.2rem !important; color: var(--accent) !important;
        font-weight: 900 !important; margin-right: 10px !important; font-variant-numeric: tabular-nums !important; line-height: 1 !important;
    }
    .kb-card-num.star-only { flex: 0 0 35px !important; width: 35px !important; font-size: 1.2rem !important; opacity: 0.6 !important; }
    .kb-card-text { font-size: 1.05rem !important; font-weight: bold !important; color: var(--forest) !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; flex: 1 !important; }
    .kb-arrow { font-size: 1.5rem !important; color: var(--accent) !important; opacity: 0.6; transition: 0.3s; }
    .kb-article-card:hover .kb-arrow { color: var(--forest); transform: translateX(5px); }

    .kb-big-cat-card { min-height: 140px !important; padding: 20px 35px !important; border-radius: 20px !important; border-left: 8px solid var(--accent) !important; }
    .kb-big-cat-card .kb-avatar { width: 100px !important; height: 100px !important; margin-right: 25px !important; flex-shrink: 0; object-fit: contain; filter: drop-shadow(4px 4px 10px rgba(26, 47, 35, 0.12)); }
    .kb-big-cat-card .kb-card-text { font-family: 'Noto Serif TC', serif !important; font-size: 1.8rem !important; font-weight: 900 !important; letter-spacing: 3px !important; color: var(--forest) !important; }

    details.kb-section-group { margin-bottom: 40px; transition: 0.3s; }
    summary.kb-mid-separator { display: flex; align-items: center; justify-content: center; cursor: pointer; list-style: none; margin-bottom: 25px; outline: none; position: relative; }
    summary.kb-mid-separator::-webkit-details-marker { display: none; }
    summary.kb-mid-separator::before, summary.kb-mid-separator::after { content: ''; height: 2px; background: #e0e0e0; flex: 1; margin: 0 20px; }
    .kb-mid-badge { background: var(--forest); color: var(--accent); padding: 6px 25px; border-radius: 50px; font-size: 1rem; font-weight: bold; font-family: 'Noto Serif TC', serif; box-shadow: 0 4px 15px rgba(26, 47, 35, 0.2); display: flex; align-items: center; gap: 10px; transition: 0.3s; border: 2px solid transparent; }
    summary.kb-mid-separator:hover .kb-mid-badge { background: #fff; color: var(--forest); border-color: var(--forest); transform: translateY(-3px); }
    .kb-mid-badge::after { content: '▼'; font-size: 0.8em; transition: transform 0.3s; }
    details[open] summary .kb-mid-badge::after { transform: rotate(180deg); }

    .kb-search-group { display: flex !important; flex-direction: column !important; gap: 8px !important; margin-bottom: 15px !important; background: #f9f9f9; padding: 15px 40px 15px 15px !important; border-radius: 10px; border: 1px solid #eee; position: relative !important; animation: fadeSlideUp 0.3s ease-out; }
    .kb-search-title-input, .kb-search-key-input { width: 100% !important; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; flex: none !important; font-size: 16px !important; }
    .kb-group-remove-btn { position: absolute !important; top: 12px !important; right: 8px !important; background: #ffebee; color: #d32f2f; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .kb-result-section-title { display: flex; align-items: center; justify-content: center; margin: 40px 0 20px 0; color: #555; font-weight: bold; font-size: 1.1rem; }
    .kb-result-section-title::before, .kb-result-section-title::after { content: ''; height: 2px; background: #e0e0e0; flex: 1; margin: 0 20px; }
    .kb-result-section-badge { background: #fff; color: var(--forest); padding: 5px 20px; border: 2px solid var(--forest); border-radius: 50px; }
    .kb-search-mid-header { display: inline-block; background: var(--forest); color: var(--accent); padding: 6px 25px; border-radius: 50px; font-size: 1rem; font-weight: 900; font-family: 'Noto Serif TC', serif; margin-bottom: 15px; margin-left: 5px; box-shadow: 0 4px 10px rgba(26, 47, 35, 0.15); }

    .kb-article-view { background: #ffffff !important; padding: 50px 40px !important; border-radius: 24px; margin: 0 auto !important; max-width: 100% !important; position: relative !important; box-shadow: 0 10px 40px rgba(26, 47, 35, 0.08) !important; border: 1px solid #eee; }
    .kb-cat-header { text-align: center; margin-bottom: 40px; }
    .kb-cat-title-h1 { font-family: 'Noto Serif TC', serif; font-size: 2.5rem; color: var(--forest); font-weight: 900; margin: 0; letter-spacing: 2px; text-shadow: 2px 2px 0px rgba(198, 168, 124, 0.2); }
    .kb-article-title-h1 { font-family: 'Noto Serif TC', serif; font-size: 2rem; font-weight: 900; color: var(--forest); margin-bottom: 20px; line-height: 1.4; text-align: center; }
    .kb-meta-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .kb-tag { font-size: 0.9rem; padding: 4px 12px; border-radius: 20px; font-weight: bold; letter-spacing: 1px; }
    .kb-tag-big { background: var(--forest); color: #fff; }
    .kb-tag-mid { background: #fffcf5; color: var(--accent); border: 1px solid var(--accent); }
    .kb-divider { color: #ccc; font-size: 0.8rem; }
    .kb-header-actions { display: flex !important; justify-content: space-between !important; align-items: center !important; margin-bottom: 25px !important; width: 100% !important; }

    .article-render-area { padding: 0; color: #2c3e50; font-size: 16px; font-family: -apple-system, sans-serif; overflow-wrap: break-word; line-height: 1.8; }
    .article-render-area img { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: block; margin: 15px auto; }
    .article-render-area .resizable-wrapper { max-width: 100%; }
    .article-render-area .resizable-wrapper img { width: 100%; display: block; }
    .article-render-area table.peiyu-table { border-collapse: collapse; max-width: 100%; margin-bottom: 15px; }
    .article-render-area table.peiyu-table th, .article-render-area table.peiyu-table td { padding: 8px 12px; border: 1px solid #ddd; }
    .article-render-area blockquote { margin: 0 0 0 2.5em; padding: 0; border: none; background: transparent; font-style: normal; }
    .article-render-area h2.title-boxed-h2 { border-left: 8px solid var(--accent); background: var(--forest); color: #fff; padding: 10px 20px; margin: 30px 0 15px 0; border-radius: 4px; font-family: 'Noto Serif TC', serif; font-size: 1.4rem; display: table; }
    .article-render-area h3.title-boxed-h3 { border: 2px solid var(--accent); background: #fffcf5; color: var(--forest); display: inline-flex; align-items: center; justify-content: center; padding: 8px 35px; margin: 25px 0 5px 0; border-radius: 50px; font-family: 'Noto Serif TC', serif; width: auto; max-width: 100%; min-height: 50px;}

    .kb-tiny-note {
        position: absolute; top: 25px; right: 30px; z-index: 99; background: #ffffff; border: 2px dashed var(--accent); padding: 15px 25px;
        border-radius: 12px; box-shadow: 0 5px 20px rgba(198, 168, 124, 0.15); font-weight: bold !important; font-size: 13px; color: #555;
        line-height: 1.7; transform: rotate(1.2deg); transition: 0.4s;
    }
    .kb-tiny-note:hover { transform: rotate(0deg) scale(1.05) !important; box-shadow: 0 10px 30px rgba(198, 168, 124, 0.3); color: var(--forest); z-index: 100; }

    .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 47, 35, 0.9); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
    .result-overlay.active { display: flex; }
    .text-modal-card { width: 90%; max-width: 650px; max-height: 90vh; background: #fff; border-radius: 16px; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; }

    @media (max-width: 768px) {
        .section { padding: 10px 15px 60px 15px !important; }
        .brand-h3-zh, .brand-h2-en { display: block !important; width: 100% !important; margin-left: 0 !important; text-align: center !important; }
        .btn-pill-search, .kb-action-btn, .kb-internal-back { font-size: 13px !important; height: 36px !important; padding: 0 16px !important; }
        
        .kb-article-view { padding: 30px 18px 20px 18px !important; }
        .kb-list-container { gap: 10px !important; }
        
        .kb-article-card { padding: 5px 10px !important; min-height: 45px !important; margin-bottom: 3px !important; }
        .kb-card-num { flex: 0 0 70px !important; width: 70px !important; }
        .kb-card-num.star-only { flex: 0 0 25px !important; width: 25px !important; }
        .kb-article-card .kb-card-text { font-size: 1rem !important; letter-spacing: 1px !important; }

        .kb-big-cat-card { display: grid !important; grid-template-columns: 110px 1fr !important; grid-template-rows: 1fr 1fr !important; gap: 0 15px !important; padding: 15px !important; align-items: center !important; min-height: 120px !important; }
        .kb-big-cat-card .kb-card-content { display: contents !important; }
        .kb-big-cat-card img { grid-column: 1 !important; grid-row: 1 / 3 !important; width: 100% !important; height: 100% !important; object-fit: contain !important; margin: 0 !important; }
        .kb-big-cat-card .kb-card-text { display: block !important; grid-column: 2 !important; grid-row: 1 !important; align-self: end !important; font-size: 1.8rem !important; font-weight: 900 !important; margin: 0 !important; }
        .kb-big-cat-card .kb-arrow { grid-column: 2 !important; grid-row: 2 !important; align-self: start !important; text-align: right !important; font-size: 1.2rem !important; width: 100% !important; }
        .kb-big-cat-card .kb-arrow::before { content: "前往"; font-size: 13px !important; color: #999 !important; margin-right: 8px !important; vertical-align: middle !important; }

        .kb-tiny-note { 
            position: absolute !important; 
            top: 10px !important; /* 👈 這裡修改 */
            right: -5px !important; 
            width: fit-content; 
            max-width: 55% !important; 
            padding: 8px 10px; 
            font-size: 10px; 
            transform: rotate(2deg) !important; 
            margin: 0; 
            transition: none !important; 
            z-index: 999; 
        }
        .kb-fab-back { display: flex !important; bottom: 70px !important; right: 15px !important; width: 40px !important; height: 40px !important; font-size: 1rem !important; }
        #back-to-top { bottom: 120px !important; right: 15px !important; width: 40px !important; height: 40px !important; font-size: 1rem !important; }
    }
    @media (max-width: 768px) and (orientation: landscape) {
        .kb-tiny-note { top: 10px !important; right: 15px !important; transform: rotate(0deg) !important; }
    }
</style>
</head>
<body>

<div id="knowledge" class="section active kb-reading-mode">
    <div id="kb-container">載入中...</div>
</div>

<div id="search-overlay" class="result-overlay">
    <div class="text-modal-card" style="padding: 0;">
        <div style="background: var(--forest); padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; z-index: 100;">
            <h3 style="margin: 0; color: #fff; font-size: 1.4rem; letter-spacing: 2px;">🔍 文章搜尋</h3>
            <button onclick="closeModal('search-overlay')" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.8rem; cursor: pointer; padding: 5px 15px; z-index: 200;">✕</button>
        </div>
        <div style="padding: 30px; background: #fff;">
            <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee;">
                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px;">
                    <div><label style="font-size: 0.85rem; color: #888;">自訂報告標題 (選填)</label><input type="text" id="kb-search-report-title" placeholder="例如：我的天賦報告" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:5px; outline:none; font-size: 16px;"></div>
                    <div><label style="font-size: 0.85rem; color: #888;">篩選大分類</label><select id="kb-search-big-cat" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:5px; outline:none; font-size: 16px;"><option value="">全域搜尋</option></select></div> </div>
            </div>
            <hr style="border: 0; border-top: 2px dashed #eee; margin: 0 0 15px 0;">
            <div id="modal-search-groups-area" style="max-height: 40vh; overflow-y: auto; padding-right: 5px; margin-bottom: 10px;"></div>
            <div class="kb-search-actions" style="margin-top:25px; position:relative;">
                <button class="kb-action-btn" onclick="addSearchGroup()" style="background:#fff; color:var(--forest); border:1px solid var(--forest); padding:10px 25px;"><i class="fa-solid fa-plus"></i> 新增欄位</button>
                <button class="btn-pill-search" onclick="doKbSearch()" style="padding:10px 35px; position:absolute; right:0;"><i class="fa-solid fa-magnifying-glass"></i> 執行搜尋</button>
            </div>
        </div>
    </div>
</div>

<button id="back-to-top" onclick="scrollToTop()"><i class="fa-solid fa-arrow-up"></i></button>

<script src="../js/config.js"></script>

<script>

    let kbTree = {}, kbState = { level: 0, lastClickedId: null, activeBig: null, activeMid: null, searchQuery: null };
    let kbCatOrder = { big: [], mid: {}, hide_note: [] }; 
    let kbArticlesFlat = []; 

    document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.parent.location.search); // 🔥 修正：從外層網址抓參數
        const targetArticle = params.get('article');
        const targetQ = params.get('q'); 

        showLoading();

        await initKbData();

        if (targetArticle) {
            readArt(targetArticle);
        } else if (targetQ) {
            try {
                const decodedJson = safeB64Decode(targetQ);
                doKbSearch(JSON.parse(decodedJson));
            } catch(e) {
                renderKbHome();
            }
        } else {
            renderKbHome(); 
        }
    });

    function showLoading() {
        document.getElementById('kb-container').innerHTML = `
            <div style="height: 80vh; display: flex; justify-content: center; align-items: center; flex-direction: column;">
                <img src="../assets/images/peiyu-logo.png" style="width: 100px; height: 100px; object-fit: contain; animation: spin 2s infinite linear; filter: drop-shadow(0 0 15px rgba(198, 168, 124, 0.5));">
                <div style="margin-top: 20px; color: var(--forest); font-weight: 900; letter-spacing: 2px;">資料調閱中...</div>
            </div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>`;
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active'); 
        // 🔥 破解鍵盤 Bug：強制把被推上去的外層電視機拉回最頂端！
        if (window.parent) window.parent.scrollTo(0, 0);
    }

    async function initKbData() {
        const { data } = await myDB.from('kb_articles').select('id,title,big_category,mid_category,slug').eq('is_published', true).order('sort_order', { ascending: true });
        
        const { data: cfg } = await myDB.from('site_content').select('content').eq('title', 'kb_category_order').single();
        if (cfg && cfg.content) { kbCatOrder = cfg.content; } 

        if (data) {
            kbTree = {};
            kbArticlesFlat = data; 
            data.forEach(i => {
                if (!kbTree[i.big_category]) kbTree[i.big_category] = {};
                if (!kbTree[i.big_category][i.mid_category]) kbTree[i.big_category][i.mid_category] = [];
                kbTree[i.big_category][i.mid_category].push(i);
            });
        }
    }

    function renderKbHome() {
        kbState.level = 0; kbState.activeBig = null; kbState.activeMid = null; kbState.searchQuery = null; 
        
        // 🔥 修正：使用 window.parent 改變外層網址，徹底清乾淨
        const cleanUrl = window.parent.location.pathname + "?view=knowledge";
        window.parent.history.pushState({ path: cleanUrl }, '', cleanUrl);

        const bigCats = Object.keys(kbTree);
        const zodiacPool = Array.from({length: 12}, (_, i) => `https://geyrpowhaqfhnxghpokr.supabase.co/storage/v1/object/public/site-assets/zodiac_${i+1}.png`).sort(() => Math.random() - 0.5);

        const listHtml = bigCats.map((cat, idx) => {
            const myImg = zodiacPool[idx % zodiacPool.length];
            return `<div class="kb-article-card kb-big-cat-card" onclick="enterKb('${cat}')">
                        <div class="kb-card-content">
                            <img src="${myImg}" class="kb-avatar" alt="zodiac">
                            <div class="kb-card-text">${cat}</div>
                        </div>
                        <div class="kb-arrow">➔</div>
                    </div>`;
        }).join('');

        document.getElementById('kb-container').innerHTML = `
            <div class="brand-section-header" style="margin-bottom: 15px !important;">
                 <div class="brand-h3-zh">培癒寶典</div>                    
                 <div class="brand-h2-en">PY JOURNEY</div>
                 <div class="brand-capsule">探索自我的導引手冊</div>
            </div>
            <div class="kb-cat-view">
                <div class="kb-inner-header-row">
                    <div></div> 
                    <button class="btn-pill-search" onclick="openSearchPanel()">
                        <i class="fa-solid fa-magnifying-glass"></i> 文章搜尋生成器
                    </button>
                </div>
                <div class="kb-list-container">${listHtml}</div>
            </div>`;
        window.scrollTo(0,0);
    }

    function enterKb(big, isBack = false) { 
        kbState.level = 1;
        kbState.activeBig = big;
        
        const isHidden = kbCatOrder.hide_note && kbCatOrder.hide_note.includes(big);
        const noteHtml = isHidden ? '' : `<div class="kb-tiny-note">如果內容有誤 歡迎協助修正<br>如果看了覺得不專業或不開心<br>請直接關閉 謝謝掰掰 👋</div>`;

        let sortedMids = [];
        if (kbCatOrder && kbCatOrder.mid && kbCatOrder.mid[big]) {
            sortedMids = kbCatOrder.mid[big].filter(m => kbTree[big] && kbTree[big][m]);
            if(kbTree[big]) { Object.keys(kbTree[big]).forEach(k => { if (!sortedMids.includes(k)) sortedMids.push(k); }); }
        } else if (kbTree[big]) {
            sortedMids = Object.keys(kbTree[big]);
        }

        const contentHtml = sortedMids.map((mid, index) => {
            const arts = kbTree[big][mid]; 
            const articlesHtml = arts.map(a => {
                let displayHtml = "";
                const match = a.title.match(/^([0-9\-\.]+)\s+(.*)/);
                if (match) {
                    displayHtml = `<div class="kb-card-num">${match[1]}</div><div class="kb-card-text">${match[2]}</div>`;
                } else {
                    displayHtml = `<div class="kb-card-num star-only">✦</div><div class="kb-card-text">${a.title}</div>`;
                }
                
                return `<div class="kb-article-card" data-id="${a.id}" onclick="event.stopPropagation(); readArt('${a.id}')"><div class="kb-card-content">${displayHtml}</div><div class="kb-arrow">➔</div></div>`;
            }).join('');

            const safeMidId = `mid-group-${mid.replace(/\s+/g, '-')}`;
            let openAttr = '';
            if (isBack && kbState.activeMid) { if (mid === kbState.activeMid) openAttr = 'open'; } 
            else { if (index === 0) openAttr = 'open'; }

            return `
                <details id="${safeMidId}" class="kb-section-group" ${openAttr}>
                    <summary class="kb-mid-separator"><span class="kb-mid-badge">${mid}</span></summary>
                    <div class="kb-list-container">${articlesHtml}</div>
                </details>`;
        }).join('');
        
        document.getElementById('kb-container').innerHTML = `
            <div class="kb-cat-view">
                <div class="kb-fab-back" onclick="kbGoBack()"><i class="fa-solid fa-reply"></i></div>
                <div class="kb-header-actions">
                    <button onclick="kbGoBack()" class="kb-internal-back"><i class="fa-solid fa-arrow-left"></i> 返回目錄</button>
                </div>
                <div class="kb-cat-header"><h1 class="kb-cat-title-h1">${big}</h1>${noteHtml}</div>
                ${contentHtml}
            </div>`;
        
        if (isBack && kbState.lastClickedId) {
            setTimeout(() => {
                const target = document.querySelector(`.kb-article-card[data-id="${kbState.lastClickedId}"]`);
                if (target) {
                    target.scrollIntoView({ behavior: 'auto', block: 'center' });
                    const parentDetails = target.closest('details');
                    if (parentDetails && !parentDetails.open) parentDetails.open = true;
                }
            }, 50);
        } else {
            window.scrollTo(0, 0);
        }
    }    
    
    async function readArt(idOrSlug) {
        kbState.lastClickedId = idOrSlug; 
        const isUUID = idOrSlug.length > 20; 
        
        let query = myDB.from('kb_articles').select('*');
        if (isUUID) query = query.eq('id', idOrSlug); else query = query.eq('slug', idOrSlug);

        const { data, error } = await query.single();
        if (error || !data) return alert("找不到文章！");

        kbState.activeBig = data.big_category; 
        kbState.activeMid = data.mid_category;
        kbState.level = 2;

        const displayId = data.slug ? data.slug : data.id;
        
        // 🔥 修正：使用 window.parent 改變外層網址
        const newUrl = `${window.parent.location.pathname}?view=knowledge&article=${displayId}`;
        window.parent.history.pushState({ path: newUrl }, '', newUrl);

        const isHidden = kbCatOrder.hide_note && kbCatOrder.hide_note.includes(data.big_category);
        const noteHtml = isHidden ? '' : `<div class="kb-tiny-note">如果內容有誤 歡迎協助修正<br>如果看了覺得不專業或不開心<br>請直接關閉 謝謝掰掰 👋</div>`;
        
        document.getElementById('kb-container').innerHTML = `
            <div class="kb-article-view">
                <div class="kb-fab-back" onclick="kbGoBack()"><i class="fa-solid fa-reply"></i></div>
                <div class="kb-header-actions">
                    <div class="kb-action-group">
                        <button onclick="kbGoBack()" class="kb-internal-back"><i class="fa-solid fa-arrow-left"></i> 返回</button>
                        <button id="kb-share-btn" onclick="copyArtLink()" title="複製文章連結"><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                </div>
                ${noteHtml}
                <h1 class="kb-article-title-h1">${data.title}</h1>
                <div class="kb-meta-row">
                    <span class="kb-tag kb-tag-big">${data.big_category}</span><span class="kb-divider">●</span><span class="kb-tag kb-tag-mid">${data.mid_category}</span>
                </div>
                <div class="article-render-area">${data.body}</div>
            </div>`;
            
        window.scrollTo(0, 0); 
    }

    function openSearchPanel(existingData = null) {
        const area = document.getElementById('modal-search-groups-area');
        const bigCatSelect = document.getElementById('kb-search-big-cat');
        if (!area || !bigCatSelect) return;
        
        bigCatSelect.innerHTML = '<option value="">全域搜尋</option>' + Object.keys(kbTree).map(c => `<option value="${c}">${c}</option>`).join('');

        area.innerHTML = ''; 
        if (existingData && existingData.groups) {
            document.getElementById('kb-search-report-title').value = existingData.reportTitle || '';
            bigCatSelect.value = existingData.filterCat || '';
            existingData.groups.forEach(item => addSearchGroup(item.title, item.keys));
        } else {
            addSearchGroup(); 
        }
        openModal('search-overlay');
    }

    function addSearchGroup(title = '', keywords = '') {
        const area = document.getElementById('modal-search-groups-area');
        if (!area) return;
        const div = document.createElement('div');
        div.className = 'kb-search-group';
        div.innerHTML = `
            <input type="text" class="kb-search-title-input" placeholder="小標題 (選填)" value="${title}">
            <input type="text" class="kb-search-key-input" placeholder="搜尋關鍵字 (如: 12, 38)" value="${keywords}">
            <button class="kb-group-remove-btn" onclick="this.parentElement.remove()">✕</button>`;
        area.appendChild(div);
        
        setTimeout(() => {
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
            const keyInput = div.querySelector('.kb-search-key-input');
            if(keyInput) keyInput.focus();
        }, 50);
    }

    function doKbSearch(forceData = null, isBack = false) { 
        if (document.activeElement) document.activeElement.blur(); // 收起鍵盤
        
        // 🔥 破解鍵盤 Bug：按下搜尋時，確保外層大門乖乖降落回原位！
        if (window.parent) window.parent.scrollTo(0, 0);

        if (!kbArticlesFlat || kbArticlesFlat.length === 0) return;
        
        let searchData = { reportTitle: '', filterCat: '', groups: [] };
        if (forceData) { searchData = forceData; } else {
            searchData.reportTitle = document.getElementById('kb-search-report-title').value.trim();
            searchData.filterCat = document.getElementById('kb-search-big-cat').value;
            document.querySelectorAll('#modal-search-groups-area .kb-search-group').forEach(g => {
                const t = g.querySelector('.kb-search-title-input').value.trim();
                const k = g.querySelector('.kb-search-key-input').value.trim();
                if (k) searchData.groups.push({ title: t, keys: k });
            });
        }
        
        if (searchData.groups.length === 0) return;
        window.scrollTo(0, 0); closeModal('search-overlay'); showLoading();
        
        setTimeout(() => {
            kbState.level = 3; 
            kbState.searchQuery = searchData;
            if (!isBack) { 
                const base64Str = safeB64Encode(JSON.stringify(searchData));
                // 🔥 修正：使用 window.parent 改變外層網址
                const newUrl = `${window.parent.location.pathname}?view=knowledge&q=${base64Str}`;
                window.parent.history.pushState({ path: newUrl }, '', newUrl);
            }
            renderSearchResults(searchData, isBack); 
        }, 800); 
    }

    function renderSearchResults(searchData, isBack = false) { 
        let finalHtml = ""; let totalCount = 0;
        const displayTitle = searchData.reportTitle || "文章搜尋結果";

        searchData.groups.forEach((group) => {
            const keywords = group.keys.split(/[,.，、\s]+/).filter(k => k.trim() !== "");
            let pool = kbArticlesFlat;
            if (searchData.filterCat) pool = pool.filter(a => a.big_category === searchData.filterCat);

            const results = pool.filter(art => {
                return keywords.some(k => {
                    if (/^\d+$/.test(k)) {
                        const regex = new RegExp(`(^|[^0-9])0?${parseInt(k, 10)}([^0-9]|$)`);
                        return regex.test(art.title);
                    } else return art.title.includes(k);
                });
            });
            
            totalCount += results.length;
            const sectionTitle = group.title || `搜尋：${keywords.join('、')}`;
            let contentHtml = "";

            if (results.length === 0) {
                contentHtml = `<div style="text-align:center; color:#ccc; padding:20px;">(此區無相關文章)</div>`;
            } else {
                const grouped = {};
                results.forEach(art => { const mid = art.mid_category || '其他'; if (!grouped[mid]) grouped[mid] = []; grouped[mid].push(art); });

                Object.keys(grouped).forEach(midCat => {
                    const cards = grouped[midCat].map(a => {
                        const m = a.title.match(/^([0-9\-\.]+)\s+(.*)/);
                        let displayHtml = m ? `<div class="kb-card-num">${m[1]}</div><div class="kb-card-text">${m[2]}</div>` : `<div class="kb-card-num star-only">✦</div><div class="kb-card-text">${a.title}</div>`;
                        
                        return `<div class="kb-article-card" data-id="${a.id}" onclick="readArt('${a.id}')"><div class="kb-card-content">${displayHtml}</div><div class="kb-arrow">➔</div></div>`;
                    }).join('');
                    contentHtml += `<div><div class="kb-search-mid-header">${midCat}</div><div class="kb-list-container">${cards}</div></div>`;
                });
            }
            finalHtml += `<div style="margin-bottom:30px;"><div class="kb-result-section-title"><span class="kb-result-section-badge">${sectionTitle}</span></div>${contentHtml}</div>`;
        });

        document.getElementById('kb-container').innerHTML = `
            <div id="search-anchor-top" style="height:1px; width:100%;"></div>
            <div class="brand-section-header" style="margin-top: 10px;">
                <div class="brand-h3-zh">${displayTitle}</div>                    
                <div class="brand-h2-en">SEARCH RESULTS</div>
                <div class="brand-capsule">共搜尋到 ${totalCount} 篇文章</div>
            </div>
            <div class="kb-cat-view">
                <div class="kb-inner-header-row">
                    <div class="kb-action-group">
                        <button onclick="kbGoBack()" class="kb-internal-back"><i class="fa-solid fa-arrow-left"></i> 返回</button>
                        <button id="kb-share-btn" onclick="copyArtLink()" title="分享此報告"><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                    <button class="btn-pill-search" onclick="openSearchPanel(kbState.searchQuery)"><i class="fa-solid fa-magnifying-glass"></i> 重新搜尋</button>
                </div>
                ${finalHtml}
            </div>`;
        
        if (isBack && kbState.lastClickedId) {
            setTimeout(() => {
                const target = document.querySelector(`.kb-article-card[data-id="${kbState.lastClickedId}"]`);
                if (target) target.scrollIntoView({ behavior: 'auto', block: 'center' });
            }, 100);
        } else {
            const anchor = document.getElementById('search-anchor-top');
            if (anchor) {
                const topPos = anchor.getBoundingClientRect().top + window.scrollY;
                window.scrollTo({ top: topPos - 120, behavior: 'auto' });
            } else window.scrollTo(0, 0);
        }
    }

    function kbGoBack() {
        document.title = "培癒試驗室";
        document.getElementById('knowledge').classList.remove('kb-reading-mode');
        
        if (kbState.level === 2) { 
            if (kbState.searchQuery) {
                doKbSearch(kbState.searchQuery, true); 
            }
            else if (kbState.activeBig) {
                // 🔥 修正：使用 window.parent 改變外層網址，徹底清乾淨
                const cleanUrl = window.parent.location.pathname + "?view=knowledge";
                window.parent.history.pushState({ path: cleanUrl }, '', cleanUrl);
                enterKb(kbState.activeBig, true); 
            } 
            else {
                // 🔥 修正：使用 window.parent 改變外層網址，徹底清乾淨
                const cleanUrl = window.parent.location.pathname + "?view=knowledge";
                window.parent.history.pushState({ path: cleanUrl }, '', cleanUrl);
                renderKbHome();
            }
        } 
        else {
            // 🔥 修正：使用 window.parent 改變外層網址，徹底清乾淨
            const cleanUrl = window.parent.location.pathname + "?view=knowledge";
            window.parent.history.pushState({ path: cleanUrl }, '', cleanUrl);
            renderKbHome();
        }
    }

    async function copyArtLink() {
        const articleTitle = document.querySelector('.kb-article-title-h1');
        const searchTitle = document.querySelector('.brand-h3-zh');
        const currentTitle = articleTitle ? articleTitle.innerText : (searchTitle ? searchTitle.innerText : '培癒寶典');

        // 抓取 window.parent (外層大門) 的網址
        const finalShareUrl = window.parent.location.href;
        const shareData = { title: `培癒試驗室 - ${currentTitle}`, text: `培癒試驗室 - ${currentTitle}`, url: finalShareUrl };

        // 🔥 關鍵修正：判斷是否為手機，若是，則委託外層大門 (index.html) 執行原生分享
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        
        if (isMobile && window.parent && typeof window.parent.triggerNativeShare === 'function') {
            // 呼叫大門的專屬分享函數
            window.parent.triggerNativeShare(shareData);
            return;
        }

        // 2. 電腦版或大門沒有寫分享功能時，呼叫無敵複製工具
        fallbackCopyText(shareData.url, () => {
            const btn = document.getElementById('kb-share-btn');
            if (btn) {
                const icon = btn.querySelector('i');
                const originalIcon = icon.className;
                icon.className = 'fa-solid fa-check';
                btn.style.background = '#27ae60';
                setTimeout(() => { icon.className = originalIcon; btn.style.background = ''; }, 1500);
            }
            alert("✅ 網址已成功複製到剪貼簿！");
        });
    }
    // 🔥 萬用無敵複製工具 (破解 Iframe 限制)
    function fallbackCopyText(text, callback) {
        // 先嘗試現代語法
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text)
                .then(callback)
                .catch(() => tryOldSchoolCopy(text, callback)); 
        } else { 
            // 失敗就用老派物理語法
            tryOldSchoolCopy(text, callback); 
        }
    }

    function tryOldSchoolCopy(text, callback) {
        try {
            const textArea = document.createElement("textarea"); 
            textArea.value = text;
            // 把輸入框藏在畫面外
            textArea.style.position = "fixed"; 
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea); 
            textArea.focus(); 
            textArea.select();
            // 強制執行物理複製
            const successful = document.execCommand('copy'); 
            document.body.removeChild(textArea);
            
            if(successful && callback) callback();
            else if (!successful) alert("⚠️ 您的瀏覽器阻擋了自動複製，請手動複製上方網址列的網址喔！");
        } catch (err) { 
            alert("⚠️ 您的瀏覽器阻擋了自動複製，請手動複製上方網址列的網址喔！");
        }
    }
    
    window.onscroll = function() {
        const scrollTop = document.body.scrollTop || document.documentElement.scrollTop;
        const isScrolled = scrollTop > 300; 
        const topBtn = document.getElementById('back-to-top');
        if (topBtn) { if (isScrolled) topBtn.classList.add('show'); else topBtn.classList.remove('show'); }

        const backBtn = document.querySelector('.kb-fab-back');
        if (backBtn) { if (isScrolled) backBtn.classList.add('show'); else backBtn.classList.remove('show'); }
    };

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function safeB64Encode(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1))); }
    function safeB64Decode(str) { str = str.replace(/ /g, '+'); return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>培癒試驗室 - 頁籤 UX 測試沙盒</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
<style>
    /* 基礎品牌設定 */
    :root { --forest: #1a2f23; --accent: #c6a87c; --cream: #f9f7f2; --white: #ffffff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: #e0e5ec; color: #2c3e50; line-height: 1.7; display: flex; justify-content: center; padding: 20px; }
    
    /* 模擬手機外框 */
    .mobile-simulator {
        width: 100%;
        max-width: 420px; /* 模擬手機寬度 */
        background: var(--cream);
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        overflow: hidden;
        border: 8px solid #fff;
        padding-bottom: 30px;
    }

    .app-header { background: var(--forest); color: var(--accent); text-align: center; padding: 20px; font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; }

    .test-section { padding: 20px 15px; border-bottom: 2px dashed #ddd; background: #fff; margin-bottom: 10px; }
    .section-title { font-size: 0.9rem; color: #888; margin-bottom: 15px; font-weight: bold; border-left: 4px solid var(--accent); padding-left: 8px; }
    .section-desc { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; line-height: 1.4; }

    /* 通用膠囊按鈕樣式 */
    .kb-tab-btn {
        flex-shrink: 0; padding: 8px 20px; border-radius: 50px; font-size: 0.95rem; font-weight: bold; 
        font-family: 'Noto Serif TC', serif; cursor: pointer; transition: all 0.3s;
        background: #ffffff; border: 1px solid #e0e0e0; color: #777; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        white-space: nowrap; user-select: none;
    }
    .kb-tab-btn.active {
        background: var(--forest); color: var(--accent); border-color: var(--forest);
        box-shadow: 0 4px 15px rgba(26, 47, 35, 0.2); transform: translateY(-2px);
    }

    /* ======================================================
       🎯 方案 1：邊緣漸層 + 半截誘餌 (目前主流)
       ====================================================== */
    .ux-type-1 {
        display: flex; gap: 10px; overflow-x: auto; 
        padding: 5px 40px 15px 5px; /* 右邊預留 40px 的 padding，保證最後一個字被切一半 */
        scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }
    .ux-type-1::-webkit-scrollbar { display: none; }

    /* ======================================================
       🎯 方案 2：多行折行展開 (一目瞭然版)
       ====================================================== */
    .ux-type-2 {
        display: flex; flex-wrap: wrap; gap: 8px; padding: 5px 0;
    }
    .ux-type-2 .kb-tab-btn {
        font-size: 0.85rem; padding: 6px 16px; 
    }

    /* ======================================================
       🎯 方案 3：滑動 + 右側展開/收起鈕 (專業升級版)
       ====================================================== */
    .ux-type-3-wrapper { position: relative; width: 100%; transition: 0.3s; }
    .ux-type-3 {
        display: flex; gap: 10px; overflow-x: auto; padding: 5px 50px 15px 5px; 
        scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch; transition: 0.3s;
    }
    .ux-type-3::-webkit-scrollbar { display: none; }
    
    /* 展開狀態：多行折行、右邊留空間給收合按鈕 */
    .ux-type-3.expanded { flex-wrap: wrap; padding-right: 50px; }

    .expand-btn {
        position: absolute; right: 0; top: 0; height: 46px; width: 50px;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 40%);
        border: none; cursor: pointer; display: flex; align-items: center; justify-content: flex-end;
        padding-right: 5px; color: var(--forest); font-size: 1.2rem;
        z-index: 10; transition: 0.3s;
    }
    
    /* 展開後，按鈕變成純白底色，避免跟後面的膠囊文字疊在一起看不清楚 */
    .ux-type-3-wrapper.is-open .expand-btn { 
        background: rgba(255,255,255,0.9); 
        border-radius: 0 0 0 10px; /* 給個小圓角更精緻 */
        backdrop-filter: blur(2px);
    }

</style>
</head>
<body>

<div class="mobile-simulator">
    <div class="app-header">頁籤 UX 實驗室</div>

    <div class="test-section">
        <div class="section-title">方案 1：漸層消失 + 半截誘餌</div>
        <div class="section-desc">利用右側的漸層淡出效果，加上刻意被切掉一半的按鈕，直覺暗示使用者「右邊還有東西可以滑」。</div>
        
        <div class="ux-type-1" id="group-1">
            <button class="kb-tab-btn active">顯示全部</button>
            <button class="kb-tab-btn">1/22-1/27</button>
            <button class="kb-tab-btn">1/28-2/2</button>
            <button class="kb-tab-btn">2/3-2/8</button>
            <button class="kb-tab-btn">2/9-2/13</button>
            <button class="kb-tab-btn">2/14-2/19</button>
        </div>
    </div>

    <div class="test-section">
        <div class="section-title">方案 2：全展開標籤雲模式</div>
        <div class="section-desc">放棄橫向滑動，直接讓所有選項像積木一樣疊下來。適合分類不多的情況。</div>
        
        <div class="ux-type-2" id="group-2">
            <button class="kb-tab-btn active">顯示全部</button>
            <button class="kb-tab-btn">1/22-1/27</button>
            <button class="kb-tab-btn">1/28-2/2</button>
            <button class="kb-tab-btn">2/3-2/8</button>
            <button class="kb-tab-btn">2/9-2/13</button>
            <button class="kb-tab-btn">2/14-2/19</button>
        </div>
    </div>

    <div class="test-section" style="border-bottom: none;">
        <div class="section-title">方案 3：滑動 + 下拉展開/收起鈕</div>
        <div class="section-desc">平時單行滑動，點擊右側箭頭「展開所有標籤」，再點一次「收合」。(已加入箭頭動態切換)</div>
        
        <div class="ux-type-3-wrapper" id="wrapper-3">
            <div class="ux-type-3" id="group-3">
                <button class="kb-tab-btn active">顯示全部</button>
                <button class="kb-tab-btn">1/22-1/27</button>
                <button class="kb-tab-btn">1/28-2/2</button>
                <button class="kb-tab-btn">2/3-2/8</button>
                <button class="kb-tab-btn">2/9-2/13</button>
                <button class="kb-tab-btn">2/14-2/19</button>
            </div>
            <button class="expand-btn" onclick="toggleExpand()">
                <i class="fa-solid fa-circle-chevron-down"></i>
            </button>
        </div>
    </div>

</div>

<script>
    // 綁定點擊變色效果
    function bindTabEvents(groupId) {
        const group = document.getElementById(groupId);
        const btns = group.querySelectorAll('.kb-tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', function() {
                btns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                if(groupId !== 'group-2') {
                    this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            });
        });
    }

    bindTabEvents('group-1');
    bindTabEvents('group-2');
    bindTabEvents('group-3');

    // 🔥 方案 3 的展開/收合邏輯 (加入切換箭頭)
    function toggleExpand() {
        const wrapper = document.getElementById('wrapper-3');
        const container = document.getElementById('group-3');
        const icon = wrapper.querySelector('.expand-btn i');
        
        // 切換展開/收合的 class
        wrapper.classList.toggle('is-open');
        const isOpen = container.classList.toggle('expanded');
        
        // 根據狀態改變箭頭圖示
        if (isOpen) {
            icon.className = 'fa-solid fa-circle-chevron-up';
        } else {
            icon.className = 'fa-solid fa-circle-chevron-down';
            // 收合時，把目前選中的那顆按鈕拉回視線中間
            const activeBtn = container.querySelector('.kb-tab-btn.active');
            if(activeBtn) {
                setTimeout(() => activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 300);
            }
        }
    }
</script>
</body>
</html>
